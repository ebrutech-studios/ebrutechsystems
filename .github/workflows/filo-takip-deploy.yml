name: Filo Takip Firebase Hosting Deploy

on:
  push:
    branches:
      - main
    paths:
      - "filo-takip/**"
      - ".github/workflows/filo-takip-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (filotakip-355ea)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FILOTAKIP }}
          channelId: live
          projectId: filotakip-355ea
          entryPoint: ./filo-takip
