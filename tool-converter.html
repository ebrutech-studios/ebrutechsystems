<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">🖼️ Format Dönüştürücü</h1>
  <p class="lead" style="margin:14px 0 26px">PNG, JPG ve WebP arasında dönüştür. Görseliniz cihazınızdan çıkmaz.</p>

  <div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla<br><span style="color:var(--txt-faint);font-size:.85rem">PNG · JPG · WebP</span></p>
    <input id="file" type="file" accept="image/*" class="hidden"></div>

  <div id="panel" class="controls hidden">
    <div class="field"><label>Çıktı formatı</label>
      <select id="fmt"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select></div>
    <div class="field" id="qWrap"><label>Kalite: <span id="qVal">90</span>%</label>
      <input id="q" type="range" min="10" max="100" value="90"></div>
    <button id="go" class="btn btn-primary">Dönüştür & İndir</button>
  </div>
  <div id="preview" class="preview hidden"><img id="img" alt="Dönüştürülecek görsel önizlemesi"></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null;
const dz=document.getElementById("dz"),file=document.getElementById("file");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
function load(f){const r=new FileReader();r.onload=ev=>{imgEl=new Image();imgEl.onload=()=>{
  document.getElementById("img").src=imgEl.src;
  document.getElementById("preview").classList.remove("hidden");
  document.getElementById("panel").classList.remove("hidden");
};imgEl.src=ev.target.result;};r.readAsDataURL(f);}
const q=document.getElementById("q"),qVal=document.getElementById("qVal"),fmt=document.getElementById("fmt"),qWrap=document.getElementById("qWrap");
q.oninput=()=>qVal.textContent=q.value;
fmt.onchange=()=>qWrap.style.display=fmt.value==="image/png"?"none":"block";
document.getElementById("go").onclick=()=>{
  if(!imgEl)return;
  const c=document.createElement("canvas");c.width=imgEl.naturalWidth;c.height=imgEl.naturalHeight;
  const ctx=c.getContext("2d");
  if(fmt.value==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);}
  ctx.drawImage(imgEl,0,0);
  c.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download="ebrutech."+(fmt.value.split("/")[1].replace("jpeg","jpg"));a.click();
    ETSlib.toast("İndiriliyor ✓");},fmt.value,q.value/100);
};
</script>
