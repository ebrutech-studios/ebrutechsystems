<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🖼️ Format Dönüştürücü</h1>
<p class="lead" style="margin:14px 0 26px">PNG, JPG ve WebP arasında dönüştür. Önce/sonra boyut karşılaştırması anında gösterilir.</p>

<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla<br><span style="color:var(--txt-faint);font-size:.85rem">PNG · JPG · WebP · GIF · BMP</span></p>
<input id="file" type="file" accept="image/*" class="hidden"></div>

<div id="panel" class="controls hidden">
<div class="row">
<div class="field" style="flex:2"><label>Çıktı Formatı</label>
<select id="fmt">
<option value="image/webp">WebP (en küçük)</option>
<option value="image/jpeg">JPG (uyumlu)</option>
<option value="image/png">PNG (kayıpsız)</option>
</select></div>
<div class="field" id="qWrap" style="flex:1"><label>Kalite: <strong id="qVal">90</strong>%</label>
<input id="q" type="range" min="10" max="100" value="90"></div>
</div>

<button id="go" class="btn btn-primary btn-lg" style="width:100%">Dönüştür & İndir</button>

<div class="info-card">
<div class="lbl">Orijinal</div>
<div class="val" id="origFmt"></div>
<div class="sub" id="origSize"></div>
<div class="sub" id="origDim"></div>
</div>
<div class="info-card accent">
<div class="lbl">Dönüştürülmüş</div>
<div class="val" id="newFmt"></div>
<div class="sub" id="newSize"></div>
<div class="sub" id="savePct"></div>
</div>
</div>
</div>

<div id="preview" class="preview hidden" style="margin-top:16px"><img id="img" alt="Dönüştürülecek görsel önizlemesi" style="max-height:300px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.04)"></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,origFile=null;
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),fmt=$("fmt"),q=$("q");
const fmtSize=n=>n<1024?n+" B":n<1048576?(n/1024).toFixed(0)+" KB":(n/1048576).toFixed(2)+" MB";

dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};

function load(f){
  origFile=f;
  const r=new FileReader();
  r.onload=ev=>{
    imgEl=new Image();
    imgEl.onload=()=>{
      $("img").src=imgEl.src;
      $("preview").classList.remove("hidden");
      $("panel").classList.remove("hidden");
      updateEstimate();
    };
    imgEl.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

q.oninput=()=>{$("qVal").textContent=q.value;updateEstimate();};
fmt.onchange=()=>{$("qWrap").style.display=fmt.value==="image/png"?"none":"block";updateEstimate();};

let estTimer;
function updateEstimate(){
  if(!imgEl||!origFile)return;
  clearTimeout(estTimer);
  estTimer=setTimeout(()=>{
    render(b=>{
      const pct=((b.size-origFile.size)/origFile.size*100).toFixed(1);
      const pos=b.size<origFile.size;
      const ext=fmt.value.split("/")[1].replace("jpeg","jpg").toUpperCase();
      const origExt=(origFile.type||origFile.name.split(".").pop()||"bilinmiyor").replace("image/","").replace("jpeg","jpg").toUpperCase();
      $("origFmt").textContent=origExt;
      $("origSize").textContent=fmtSize(origFile.size);
      $("origDim").textContent=imgEl.naturalWidth+"×"+imgEl.naturalHeight+" px";
      $("newFmt").textContent=ext;
      $("newSize").textContent=fmtSize(b.size);
      $("savePct").innerHTML=`<span class="save-badge ${pos?"pos":"neg"}">${pos?"↓ ":"↑ "+(Math.abs(pct))}% ${pos?"küçüldü":"büyüdü"}</span>`;
      $("infoArea").style.display="grid";
    });
  },300);
}

function render(cb){
  const c=document.createElement("canvas");
  c.width=imgEl.naturalWidth;c.height=imgEl.naturalHeight;
  const ctx=c.getContext("2d");
  if(fmt.value==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);}
  ctx.drawImage(imgEl,0,0);
  c.toBlob(cb,fmt.value,q.value/100);
}

$("go").onclick=()=>{
  if(!imgEl)return;
  $("go").textContent="Dönüştürülüyor...";$("go").disabled=true;
  render(b=>{
    const ext=fmt.value.split("/")[1].replace("jpeg","jpg");
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download="ebrutech."+ext;a.click();
    ETSlib.toast("İndiriliyor ✓");
    $("go").textContent="Dönüştür & İndir";$("go").disabled=false;
  });
};
</script></body></html>
