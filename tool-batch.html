<style>
.batch-file-list{display:flex;flex-direction:column;gap:6px;margin-top:16px;max-height:360px;overflow-y:auto}
.batch-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--bg-2);border:1px solid var(--border)}
.batch-item .ico{font-size:1.1rem;flex-shrink:0}
.batch-item .name{flex:1;font-size:.86rem;color:var(--txt-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.batch-item .size{font-size:.75rem;color:var(--txt-faint);white-space:nowrap}
.batch-item .status{font-size:.75rem;white-space:nowrap;padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.batch-item .status.done{border-color:rgba(200,255,46,.3);color:var(--accent);background:rgba(200,255,46,.07)}
.batch-item .status.error{border-color:rgba(255,80,80,.3);color:#ff8080;background:rgba(255,80,80,.07)}
.batch-item .status.pending{border-color:var(--border);color:var(--txt-faint)}
.batch-item .rm{background:none;border:none;color:var(--txt-faint);cursor:pointer;font-size:1rem;padding:4px;flex-shrink:0}
.batch-item .rm:hover{color:var(--txt)}
.batch-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:14px 0}
@media(max-width:560px){.batch-opts{grid-template-columns:1fr}}
.batch-progress{height:6px;border-radius:3px;background:var(--surface);overflow:hidden;margin:10px 0;display:none}
.batch-progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#9bdb00);transition:width .2s}
.batch-summary{font-size:.82rem;color:var(--txt-faint);margin-top:6px}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Toplu Resim İşleme (Pro)","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"TRY"},"url":"https://ebrutechsystems.com/tool-batch.html"}
</script>
</head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Pro Araç</span><h1 style="font-size:2.2rem">🗂️ Toplu Resim İşleme</h1>
<p class="lead" style="margin:14px 0 26px">Onlarca görseli aynı anda sıkıştır, formatını değiştir ve indir. Tarayıcıda çalışır, sunucuya yüklenmez.</p>

<div id="gate" class="card hidden" style="text-align:center;padding:40px">
<div style="font-size:2.4rem;margin-bottom:10px">🔒</div>
<h3 id="gateTitle">Yükleniyor...</h3>
<p id="gateDesc" style="color:var(--txt-dim);margin:8px 0 20px"></p>
<div id="gateBtns" class="row" style="max-width:380px;margin:0 auto"></div></div>

<div id="tool" class="hidden">
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Resimleri seç</b> veya sürükle<br><span style="color:var(--txt-faint);font-size:.85rem">PNG · JPG · WebP — Birden fazla seçebilirsin</span></p><input id="file" type="file" accept="image/*" multiple class="hidden"></div>

<div id="fileSection" class="hidden">
  <div class="batch-opts">
    <div class="field"><label>Çıktı Formatı</label>
      <select id="fmt">
        <option value="image/jpeg">JPG — küçük dosya</option>
        <option value="image/webp">WebP — modern format</option>
        <option value="image/png">PNG — kayıpsız</option>
      </select>
    </div>
    <div class="field" id="qualityWrap"><label>Kalite: <strong id="qVal">80</strong>%</label>
      <input id="q" type="range" min="10" max="100" value="80">
    </div>
    <div class="field"><label>İşlem</label>
      <button class="btn btn-primary" id="go" style="width:100%;margin-top:2px">Hepsini İşle & İndir</button>
    </div>
  </div>

  <div class="batch-progress" id="progress"><i id="bar"></i></div>
  <div class="batch-summary" id="summary"></div>
  <div class="batch-file-list" id="fileList"></div>
</div>
</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
function applyGate(user,isPro){
  const gate=document.getElementById("gate"),tool=document.getElementById("tool");
  const t=document.getElementById("gateTitle"),d=document.getElementById("gateDesc"),b=document.getElementById("gateBtns");
  if(isPro){gate.classList.add("hidden");tool.classList.remove("hidden");return;}
  gate.classList.remove("hidden");tool.classList.add("hidden");
  if(!user){t.textContent="Giriş yapman gerekiyor";d.textContent="Bu araç Pro üyelere özel. Önce giriş yap.";
    b.innerHTML='<a href="giris.html" class="btn btn-primary">Giriş Yap</a><a href="fiyatlandirma.html" class="btn btn-ghost">Pro Nedir?</a>';}
  else{t.textContent="Bu araç Pro üyelere özel";d.textContent="Hesabın var ama Pro değil. Pro'ya geçmek için WhatsApp'tan bize ulaş.";
    b.innerHTML='<a href="fiyatlandirma.html" class="btn btn-primary">Pro\'ya Geç</a>';}
}
document.addEventListener("ets-auth",(e)=>applyGate(e.detail.user,e.detail.isPro));

let files=[];
const dz=document.getElementById("dz"),fileIn=document.getElementById("file");
const fileSection=document.getElementById("fileSection"),fileList=document.getElementById("fileList");
const progress=document.getElementById("progress"),bar=document.getElementById("bar"),summary=document.getElementById("summary");

dz.onclick=()=>fileIn.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");addFiles(e.dataTransfer.files);};
fileIn.onchange=e=>addFiles(e.target.files);

function fmtSize(b){return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB";}
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function addFiles(fl){
  for(const f of fl){if(f.type.startsWith("image/"))files.push(f);}
  render();
}

function render(){
  if(!files.length){fileSection.classList.add("hidden");return;}
  fileSection.classList.remove("hidden");
  fileList.innerHTML="";
  files.forEach((f,i)=>{
    const div=document.createElement("div");div.className="batch-item";div.id="fi-"+i;
    div.innerHTML=`<span class="ico">🖼️</span><span class="name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
      <span class="size">${fmtSize(f.size)}</span>
      <span class="status pending" id="st-${i}">Bekliyor</span>
      <button class="rm" data-rm="${i}" title="Kaldır">✕</button>`;
    div.querySelector(".rm").onclick=()=>{files.splice(i,1);render();};
    fileList.appendChild(div);
  });
  summary.textContent=files.length+" görsel seçildi";
}

document.getElementById("q").oninput=()=>{document.getElementById("qVal").textContent=document.getElementById("q").value;};
document.getElementById("fmt").onchange=()=>{
  const fmt=document.getElementById("fmt").value;
  document.getElementById("qualityWrap").style.display=fmt==="image/png"?"none":"block";
};

document.getElementById("go").onclick=async()=>{
  if(!files.length)return;
  const fmt=document.getElementById("fmt").value;
  const q=parseFloat(document.getElementById("q").value)/100;
  const ext=fmt==="image/jpeg"?"jpg":fmt==="image/webp"?"webp":"png";
  const go=document.getElementById("go");
  go.disabled=true;go.textContent="İşleniyor...";
  progress.style.display="block";bar.style.width="0%";
  let done=0,errors=0;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const st=document.getElementById("st-"+i);
    st.textContent="İşleniyor...";st.className="status pending";
    try{
      await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=ev=>{
          const im=new Image();
          im.onload=()=>{
            const c=document.createElement("canvas");c.width=im.naturalWidth;c.height=im.naturalHeight;
            const ctx=c.getContext("2d");
            if(fmt==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);}
            ctx.drawImage(im,0,0);
            c.toBlob(b=>{
              if(!b){rej(new Error("toBlob failed"));return;}
              const a=document.createElement("a");a.href=URL.createObjectURL(b);
              a.download=f.name.replace(/\.[^.]+$/,"")+"-ets."+ext;a.click();
              done++;st.textContent="✓ Hazır";st.className="status done";res();
            },fmt,fmt==="image/png"?undefined:q);
          };
          im.onerror=rej;im.src=ev.target.result;
        };
        r.onerror=rej;r.readAsDataURL(f);
      });
    }catch(e){errors++;st.textContent="Hata";st.className="status error";}
    bar.style.width=Math.round((i+1)/files.length*100)+"%";
    await new Promise(r=>setTimeout(r,80));
  }
  go.disabled=false;go.textContent="Hepsini İşle & İndir";
  summary.textContent=done+" görsel işlendi"+(errors?" · "+errors+" hata":"")+" ✓";
  ETSlib.toast(done+" görsel işlendi ✓");
};
</script></body></html>
