<style>
.ratio-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ratio-chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-2);color:var(--txt-dim);font-size:.8rem;cursor:pointer;transition:.15s;font-family:monospace}
.ratio-chip:hover,.ratio-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(200,255,46,.07)}
.crop-stage{position:relative;display:inline-block;max-width:100%;touch-action:none;user-select:none}
.crop-stage img{display:block;max-width:100%;border-radius:10px}
.crop-box{position:absolute;border:2px solid var(--accent);box-shadow:0 0 0 9999px rgba(0,0,0,.55);cursor:move}
.crop-box::before,.crop-box::after{content:"";position:absolute;background:rgba(255,255,255,.25)}
.crop-box::before{left:33.33%;top:0;width:1px;height:100%}
.crop-box::after{left:66.66%;top:0;width:1px;height:100%}
.crop-rule-h{position:absolute;left:0;width:100%;height:1px;background:rgba(255,255,255,.25)}
.crop-rule-h:first-of-type{top:33.33%}
.crop-rule-h:last-of-type{top:66.66%}
.crop-handle{position:absolute;width:16px;height:16px;background:var(--accent);border-radius:50%;border:2px solid #000}
.crop-handle.br{right:-8px;bottom:-8px;cursor:nwse-resize}
.crop-handle.bl{left:-8px;bottom:-8px;cursor:nesw-resize}
.crop-handle.tr{right:-8px;top:-8px;cursor:nesw-resize}
.crop-handle.tl{left:-8px;top:-8px;cursor:nwse-resize}
.dim-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-top:10px;flex-wrap:wrap}
.dim-bar .seg{font-size:.82rem;color:var(--txt-faint)}
.dim-bar .seg strong{color:var(--accent);font-family:monospace}
.dim-bar .sep{color:var(--border);font-size:1.2rem}
</style>

<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">✂️ Resim Kırpma</h1>
<p class="lead" style="margin:14px 0 26px">Görseli serbest veya sabit oranla kırp. Kırpma alanını sürükle, yeniden boyutlandır, sonucu anında gör.</p>

<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli seç</b> veya sürükle<br><span style="color:var(--txt-faint);font-size:.85rem">PNG · JPG · WebP</span></p><input id="file" type="file" accept="image/*" class="hidden"></div>

<div id="panel" class="controls hidden">
<div style="font-size:.82rem;font-weight:600;color:var(--txt-dim);margin-bottom:8px">Oran / Kırpma Şekli</div>
<div class="ratio-chips">
  <button class="ratio-chip active" data-ratio="free">Serbest</button>
  <button class="ratio-chip" data-ratio="1">1:1 Kare</button>
  <button class="ratio-chip" data-ratio="1.7778">16:9</button>
  <button class="ratio-chip" data-ratio="0.5625">9:16</button>
  <button class="ratio-chip" data-ratio="1.3333">4:3</button>
  <button class="ratio-chip" data-ratio="0.75">3:4</button>
  <button class="ratio-chip" data-ratio="1.4142">A4</button>
</div>

<div class="row">
  <div class="field"><label>Çıktı Formatı</label>
    <select id="fmt"><option value="image/png">PNG (kayıpsız)</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select>
  </div>
  <div class="field" id="qWrap" style="display:none"><label>Kalite: <strong id="qVal">92</strong>%</label><input id="q" type="range" min="50" max="100" value="92"></div>
</div>

<button id="go" class="btn btn-primary btn-lg" style="width:100%">Kırp & İndir</button>
</div>

<div id="stageWrap" class="preview hidden">
  <div style="text-align:center;overflow:auto">
    <div class="crop-stage" id="stage">
      <img id="img" alt="Kırpılacak görsel önizlemesi">
      <div class="crop-box" id="box">
        <div class="crop-rule-h"></div><div class="crop-rule-h"></div>
        <div class="crop-handle tl" data-corner="tl"></div>
        <div class="crop-handle tr" data-corner="tr"></div>
        <div class="crop-handle bl" data-corner="bl"></div>
        <div class="crop-handle br" data-corner="br"></div>
      </div>
    </div>
  </div>
  <div class="dim-bar" id="dimBar">
    <div class="seg">Kırpma: <strong id="cropW">—</strong> × <strong id="cropH">—</strong> px</div>
    <div class="sep">|</div>
    <div class="seg">Gerçek: <strong id="cropRealW">—</strong> × <strong id="cropRealH">—</strong> px</div>
    <div class="sep">|</div>
    <div class="seg">Orijinal: <strong id="origDim">—</strong></div>
  </div>
</div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const imgEl=document.getElementById("img"),box=document.getElementById("box"),stage=document.getElementById("stage");
const $=id=>document.getElementById(id);
let crop={x:20,y:20,w:200,h:200},ratio="free";

const dz=$("dz"),file=$("file");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};

function load(f){
  const r=new FileReader();
  r.onload=ev=>{
    imgEl.onload=()=>{
      $("stageWrap").classList.remove("hidden");
      $("panel").classList.remove("hidden");
      setTimeout(()=>{
        const w=imgEl.clientWidth,h=imgEl.clientHeight;
        crop={x:Math.round(w*0.1),y:Math.round(h*0.1),w:Math.round(w*0.5),h:Math.round(h*0.5)};
        applyRatio();render();
        $("origDim").textContent=imgEl.naturalWidth+" × "+imgEl.naturalHeight+" px";
      },50);
    };
    imgEl.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

document.querySelectorAll(".ratio-chip").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".ratio-chip").forEach(c=>c.classList.remove("active"));
    btn.classList.add("active");ratio=btn.dataset.ratio;applyRatio();render();
  };
});

$("fmt").onchange=()=>{$("qWrap").style.display=$("fmt").value==="image/png"?"none":"block";};
$("q").oninput=()=>{$("qVal").textContent=$("q").value;};

function applyRatio(){if(ratio!=="free"){crop.h=Math.round(crop.w/parseFloat(ratio));}}

function render(){
  box.style.left=crop.x+"px";box.style.top=crop.y+"px";
  box.style.width=crop.w+"px";box.style.height=crop.h+"px";
  const sx=imgEl.naturalWidth/imgEl.clientWidth,sy=imgEl.naturalHeight/imgEl.clientHeight;
  $("cropW").textContent=crop.w;$("cropH").textContent=crop.h;
  $("cropRealW").textContent=Math.round(crop.w*sx);$("cropRealH").textContent=Math.round(crop.h*sy);
}

let drag=null;
box.addEventListener("pointerdown",e=>{
  if(e.target.dataset.corner)return;
  drag={px:e.clientX,py:e.clientY,ox:crop.x,oy:crop.y};
  box.setPointerCapture(e.pointerId);
  e.preventDefault();
});
box.addEventListener("pointermove",e=>{
  if(!drag)return;
  const dx=e.clientX-drag.px,dy=e.clientY-drag.py;
  crop.x=Math.max(0,Math.min(imgEl.clientWidth-crop.w,drag.ox+dx));
  crop.y=Math.max(0,Math.min(imgEl.clientHeight-crop.h,drag.oy+dy));
  render();
});
box.addEventListener("pointerup",()=>drag=null);

let rs=null;
document.querySelectorAll(".crop-handle").forEach(handle=>{
  handle.addEventListener("pointerdown",e=>{
    e.stopPropagation();
    rs={px:e.clientX,py:e.clientY,ox:crop.x,oy:crop.y,ow:crop.w,oh:crop.h,corner:handle.dataset.corner};
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  handle.addEventListener("pointermove",e=>{
    if(!rs)return;
    const dx=e.clientX-rs.px,dy=e.clientY-rs.py;
    if(rs.corner==="br"){
      crop.w=Math.max(40,Math.min(imgEl.clientWidth-crop.x,rs.ow+dx));
      if(ratio!=="free")crop.h=Math.round(crop.w/parseFloat(ratio));
      else crop.h=Math.max(40,Math.min(imgEl.clientHeight-crop.y,rs.oh+dy));
    } else if(rs.corner==="bl"){
      const nw=Math.max(40,Math.min(rs.ox+rs.ow,rs.ow-dx));
      crop.x=rs.ox+(rs.ow-nw);crop.w=nw;
      if(ratio!=="free")crop.h=Math.round(crop.w/parseFloat(ratio));
      else crop.h=Math.max(40,Math.min(imgEl.clientHeight-crop.y,rs.oh+dy));
    } else if(rs.corner==="tr"){
      crop.w=Math.max(40,Math.min(imgEl.clientWidth-crop.x,rs.ow+dx));
      if(ratio!=="free"){crop.h=Math.round(crop.w/parseFloat(ratio));crop.y=rs.oy+rs.oh-crop.h;}
      else{const nh=Math.max(40,Math.min(rs.oy+rs.oh,rs.oh-dy));crop.y=rs.oy+(rs.oh-nh);crop.h=nh;}
    } else if(rs.corner==="tl"){
      const nw=Math.max(40,Math.min(rs.ox+rs.ow,rs.ow-dx));
      crop.x=rs.ox+(rs.ow-nw);crop.w=nw;
      if(ratio!=="free"){crop.h=Math.round(crop.w/parseFloat(ratio));crop.y=rs.oy+rs.oh-crop.h;}
      else{const nh=Math.max(40,Math.min(rs.oy+rs.oh,rs.oh-dy));crop.y=rs.oy+(rs.oh-nh);crop.h=nh;}
    }
    render();
  });
  handle.addEventListener("pointerup",()=>rs=null);
});

$("go").onclick=()=>{
  if(!imgEl.src)return;
  const sx=imgEl.naturalWidth/imgEl.clientWidth,sy=imgEl.naturalHeight/imgEl.clientHeight;
  const rw=Math.round(crop.w*sx),rh=Math.round(crop.h*sy);
  const c=document.createElement("canvas");c.width=rw;c.height=rh;
  c.getContext("2d").drawImage(imgEl,crop.x*sx,crop.y*sy,rw,rh,0,0,rw,rh);
  const fmt=$("fmt").value,q=parseFloat($("q").value)/100;
  c.toBlob(b=>{
    const ext=fmt.split("/")[1].replace("jpeg","jpg");
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download="ebrutech-kirpildi."+ext;a.click();
    ETSlib.toast("Kırpıldı & indirildi ✓ "+rw+"×"+rh+" px");
  },fmt,q);
};
</script></body></html>
