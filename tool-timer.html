<style>
.timer-tabs{display:flex;gap:8px;margin-bottom:28px}
.timer-tab{
  padding:9px 22px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--txt-dim);cursor:pointer;
  font-family:var(--font-body);font-size:.9rem;font-weight:600;transition:.18s;
}
.timer-tab.active{background:var(--accent);color:#10140a;border-color:var(--accent)}
.timer-tab:not(.active):hover{border-color:var(--border-strong);color:var(--txt)}

.timer-display{

  background:var(--bg-2);color:var(--txt);outline:none;transition:.18s;

<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">⏱️ Kronometre & Sayaç</h1>
  <p class="lead" style="margin:14px 0 26px">Kronometre ve geri sayım sayacı — tarayıcıda, kayıt gerekmez.</p>

  <div class="timer-tabs">
    <button class="timer-tab active" id="tabStopwatch">⏱️ Kronometre</button>
    <button class="timer-tab" id="tabCountdown">⏳ Geri Sayım</button>
  </div>

  <!-- Kronometre -->
  <div class="timer-panel active" id="panelStopwatch">
    <div class="timer-display" id="swDisplay">00:00.00</div>
    <div class="timer-controls">
      <button class="btn btn-primary" id="swStart">▶ Başlat</button>
      <button class="btn btn-ghost" id="swReset">↺ Sıfırla</button>
    </div>
  </div>

  <!-- Geri Sayım -->
  <div class="timer-panel" id="panelCountdown">
    <div class="countdown-inputs">
      <div class="cd-field"><label>Dakika</label><input type="number" id="cdMin" min="0" max="99" value="1" placeholder="00"></div>
      <div class="cd-sep">:</div>
      <div class="cd-field"><label>Saniye</label><input type="number" id="cdSec" min="0" max="59" value="0" placeholder="00"></div>
    </div>
    <div class="timer-display" id="cdDisplay">01:00</div>
    <div class="timer-finished-msg" id="cdMsg">⏰ Süre Doldu!</div>
    <div class="timer-controls">
      <button class="btn btn-primary" id="cdStart">▶ Başlat</button>
      <button class="btn btn-ghost" id="cdReset">↺ Sıfırla</button>
    </div>
  </div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
/* Sekme geçişi */
document.getElementById('tabStopwatch').addEventListener('click',()=>{
  document.getElementById('tabStopwatch').classList.add('active');
  document.getElementById('tabCountdown').classList.remove('active');
  document.getElementById('panelStopwatch').classList.add('active');
  document.getElementById('panelCountdown').classList.remove('active');
});
document.getElementById('tabCountdown').addEventListener('click',()=>{
  document.getElementById('tabCountdown').classList.add('active');
  document.getElementById('tabStopwatch').classList.remove('active');
  document.getElementById('panelCountdown').classList.add('active');
  document.getElementById('panelStopwatch').classList.remove('active');
});

/* Kronometre */
let swRunning=false,swStart=0,swElapsed=0,swRaf=null;
const swDisp=document.getElementById('swDisplay');
function swFmt(ms){
  const m=Math.floor(ms/60000);
  const s=Math.floor((ms%60000)/1000);
  const cs=Math.floor((ms%1000)/10);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');
}
function swTick(){if(!swRunning)return;swDisp.textContent=swFmt(swElapsed+performance.now()-swStart);swRaf=requestAnimationFrame(swTick);}
document.getElementById('swStart').addEventListener('click',function(){
  if(swRunning){swElapsed+=performance.now()-swStart;swRunning=false;this.textContent='▶ Devam Et';cancelAnimationFrame(swRaf);}
  else{swStart=performance.now();swRunning=true;this.textContent='⏸ Durdur';swRaf=requestAnimationFrame(swTick);}
});
document.getElementById('swReset').addEventListener('click',()=>{
  cancelAnimationFrame(swRaf);swRunning=false;swElapsed=0;swDisp.textContent='00:00.00';
  document.getElementById('swStart').textContent='▶ Başlat';
});

/* Geri Sayım */
let cdRunning=false,cdInterval=null,cdRemaining=0;
const cdDisp=document.getElementById('cdDisplay');
const cdMsg=document.getElementById('cdMsg');
function cdFmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function cdGetTotal(){return (parseInt(document.getElementById('cdMin').value)||0)*60+(parseInt(document.getElementById('cdSec').value)||0);}
function cdUpdate(){cdDisp.textContent=cdFmt(cdRemaining);}

document.getElementById('cdMin').addEventListener('input',()=>{if(!cdRunning){cdRemaining=cdGetTotal();cdUpdate();}});
document.getElementById('cdSec').addEventListener('input',()=>{if(!cdRunning){cdRemaining=cdGetTotal();cdUpdate();}});

document.getElementById('cdStart').addEventListener('click',function(){
  if(cdRunning){
    clearInterval(cdInterval);cdRunning=false;this.textContent='▶ Devam Et';
  } else {
    if(!cdRunning&&cdRemaining===0){cdRemaining=cdGetTotal();}
    if(cdRemaining<=0)return;
    cdDisp.classList.remove('finished');cdMsg.style.display='none';
    cdRunning=true;this.textContent='⏸ Durdur';
    cdInterval=setInterval(()=>{
      cdRemaining--;cdUpdate();
      if(cdRemaining<=0){
        clearInterval(cdInterval);cdRunning=false;
        cdDisp.classList.add('finished');
        cdMsg.style.display='block';
        document.getElementById('cdStart').textContent='▶ Başlat';
        try{const a=new AudioContext();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1);o.start();o.stop(a.currentTime+1);}catch(e){}
      }
    },1000);
  }
});
document.getElementById('cdReset').addEventListener('click',()=>{
  clearInterval(cdInterval);cdRunning=false;cdRemaining=cdGetTotal();
  cdUpdate();cdDisp.classList.remove('finished');cdMsg.style.display='none';
  document.getElementById('cdStart').textContent='▶ Başlat';
});
cdRemaining=cdGetTotal();cdUpdate();
</script>
