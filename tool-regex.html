<style>
.rx-pattern-row{display:flex;gap:8px;margin-bottom:14px;align-items:stretch}
.rx-slash{font-size:1.4rem;color:var(--txt-dim);font-family:monospace;padding:0 2px;display:flex;align-items:center}
.rx-pattern{flex:1;padding:11px 14px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--accent);font-family:monospace;font-size:1rem;outline:none;transition:.18s}
.rx-pattern:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,46,.1)}
.rx-pattern.error{border-color:#ff5050;color:#ff9999;box-shadow:0 0 0 3px rgba(255,80,80,.1)}
.rx-flags{width:90px;padding:11px 12px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--txt);font-family:monospace;font-size:1rem;outline:none;transition:.18s}
.rx-flags:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,46,.1)}
.rx-err{color:#ff8080;font-size:.83rem;margin-bottom:10px;min-height:18px}
.rx-ta{width:100%;height:160px;padding:14px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--txt);font-family:monospace;font-size:.9rem;line-height:1.65;resize:vertical;outline:none;transition:.18s;box-sizing:border-box;margin-bottom:6px}
.rx-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,46,.1)}
.rx-preview{min-height:70px;max-height:260px;overflow-y:auto;padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-2);font-family:monospace;font-size:.9rem;line-height:1.65;color:var(--txt-dim);margin-bottom:18px;white-space:pre-wrap;word-break:break-word}
.rx-preview mark{background:rgba(200,255,46,.3);color:var(--txt);border-radius:3px;padding:0 1px}
.rx-stats{font-size:.83rem;color:var(--txt-dim);margin-bottom:14px;min-height:18px}
.rx-stats b{color:var(--accent)}
.rx-matches{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.rx-match{background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:monospace;font-size:.82rem}
.rx-match-idx{color:var(--txt-faint);font-size:.72rem;margin-bottom:3px}
.rx-match-val{color:var(--accent)}
.rx-match-pos{color:var(--txt-faint);font-size:.75rem;margin-top:2px}
.rx-cheatsheet{margin-top:28px}
.rx-cheatsheet h3{font-size:.8rem;font-weight:700;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.rx-cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.rx-cs-item{background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;transition:.18s;display:flex;gap:10px;align-items:center}
.rx-cs-item:hover{border-color:var(--border-strong)}
.rx-cs-pat{font-family:monospace;font-size:.85rem;color:var(--accent);min-width:80px}
.rx-cs-desc{font-size:.78rem;color:var(--txt-dim)}
</style>
</head>
<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">Regex Test Aracı</h1>
  <p class="lead" style="margin:14px 0 22px">JavaScript regex pattern test et — eşleşmeler anında vurgulanır, gruplar listelenir.</p>

  <div class="rx-pattern-row">
    <span class="rx-slash">/</span>
    <input class="rx-pattern" id="rxPat" type="text" placeholder="[a-z]+" spellcheck="false" autocomplete="off">
    <span class="rx-slash">/</span>
    <input class="rx-flags" id="rxFlags" type="text" placeholder="gi" value="gi" maxlength="6" spellcheck="false">
  </div>
  <div class="rx-err" id="rxErr"></div>

  <textarea class="rx-ta" id="rxText" placeholder="Test metni buraya gir...">Lorem ipsum dolor sit amet, consectetur adipiscing elit. 123-456 tarihli fatura: #A007. Mail: test@example.com</textarea>

  <div class="rx-stats" id="rxStats"></div>
  <div class="rx-preview" id="rxPreview"></div>

  <div class="rx-matches" id="rxMatches"></div>

  <div class="rx-cheatsheet">
    <h3>Hızlı Referans — Tıkla ve Uygula</h3>
    <div class="rx-cs-grid" id="rxCsGrid"></div>
  </div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const CHEAT=[
  [".","Herhangi karakter"],["\\d","Rakam [0-9]"],["\\D","Rakam dışı"],
  ["\\w","Sözcük karakteri"],["\\W","Sözcük dışı"],["\\s","Boşluk"],
  ["\\b","Sözcük sınırı"],["^","Satır başı"],["$","Satır sonu"],
  ["[abc]","a, b veya c"],["[^abc]","a, b, c dışı"],["[a-z]","a'dan z'ye"],
  ["a+","1 veya daha fazla a"],["a*","0 veya daha fazla a"],["a?","0 veya 1 a"],
  ["a{3}","Tam 3 a"],["a{2,4}","2 ile 4 arası a"],["(ab)","Yakalama grubu"],
  ["(?:ab)","Yakalamayan grup"],["a|b","a veya b"],["\\d+\\.\\d+","Ondalık sayı"],
  ["[\\w.-]+@[\\w.-]+","E-posta benzeri"],["https?://\\S+","URL benzeri"]
];

const csGrid=document.getElementById("rxCsGrid");
CHEAT.forEach(([p,d])=>{
  const el=document.createElement("div");
  el.className="rx-cs-item";
  el.innerHTML=`<span class="rx-cs-pat">${p.replace(/</g,"&lt;")}</span><span class="rx-cs-desc">${d}</span>`;
  el.addEventListener("click",()=>{document.getElementById("rxPat").value=p;run();});
  csGrid.appendChild(el);
});

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function run(){
  const pat=document.getElementById("rxPat").value;
  const flags=document.getElementById("rxFlags").value.replace(/[^gimsuy]/g,"");
  const text=document.getElementById("rxText").value;
  const err=document.getElementById("rxErr");
  const stats=document.getElementById("rxStats");
  const preview=document.getElementById("rxPreview");
  const matchList=document.getElementById("rxMatches");
  err.textContent="";

  if(!pat){
    preview.textContent=text;stats.textContent="";matchList.innerHTML="";return;
  }
  let re;
  try{
    const f=flags.includes("g")?flags:flags+"g";
    re=new RegExp(pat,f);
  }catch(e){
    err.textContent="Hata: "+e.message;
    document.getElementById("rxPat").classList.add("error");
    preview.textContent=text;stats.textContent="";matchList.innerHTML="";return;
  }
  document.getElementById("rxPat").classList.remove("error");

  const matches=[...text.matchAll(re)];
  if(!matches.length){
    preview.innerHTML=escHtml(text);
    stats.innerHTML="Eşleşme yok";
    matchList.innerHTML="";
    return;
  }
  stats.innerHTML=`<b>${matches.length}</b> eşleşme bulundu`;

  let html="",last=0;
  matches.forEach(m=>{
    html+=escHtml(text.slice(last,m.index));
    html+=`<mark>${escHtml(m[0])}</mark>`;
    last=m.index+m[0].length;
  });
  html+=escHtml(text.slice(last));
  preview.innerHTML=html;

  matchList.innerHTML=matches.map((m,i)=>`
    <div class="rx-match">
      <div class="rx-match-idx">Eşleşme #${i+1}${m.length>1?" · "+(m.length-1)+" grup":""}</div>
      <div class="rx-match-val">${escHtml(m[0])}</div>
      <div class="rx-match-pos">Konum: ${m.index}–${m.index+m[0].length-1}${m.length>1?" · Gruplar: "+m.slice(1).map((g,j)=>`(${j+1}) ${g??"-"}`).join(", "):""}</div>
    </div>`).join("");
}

document.getElementById("rxPat").addEventListener("input",run);
document.getElementById("rxFlags").addEventListener("input",run);
document.getElementById("rxText").addEventListener("input",run);
run();
</script>
</body>
</html>
