<style>
.pct-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:820px){.pct-cards{grid-template-columns:1fr}}
.pct-card{
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
  border:1px solid var(--border);border-radius:10px;padding:24px;
}
.pct-card h3{font-size:1rem;margin-bottom:16px;color:var(--txt)}
.pct-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pct-row input{flex:1;min-width:80px;padding:10px 12px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--txt);font-family:var(--font-body);font-size:.95rem;outline:none;transition:.18s}
.pct-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,46,.1)}
.pct-row span{color:var(--txt-dim);font-size:.9rem;white-space:nowrap}
.pct-result{
  margin-top:16px;padding:14px;border-radius:8px;
  background:rgba(200,255,46,.06);border:1px solid rgba(200,255,46,.18);
  text-align:center;display:none;
}
.pct-result-num{
  font-family:var(--font-display);font-size:2.2rem;
  font-weight:800;color:var(--accent);display:block;
}
.pct-result-label{font-size:.8rem;color:var(--txt-dim);margin-top:3px;display:block}
.pct-result.neg .pct-result-num{color:#ff6b6b}
.pct-result.pos .pct-result-num{color:var(--accent)}
</style>

<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">% Yüzde Hesaplama</h1>
  <p class="lead" style="margin:14px 0 32px">3 farklı yüzde hesaplama modu — artış, azalış, oran ve indirim.</p>

  <div class="pct-cards" id="pctCards">

    <!-- Mod 1: X'in Y%'i -->
    <div class="pct-card">
      <h3>1. Sayının yüzdesini bul</h3>
      <div class="pct-row">
        <input type="number" id="p1x" placeholder="Sayı">
        <span>sayısının</span>
        <input type="number" id="p1y" placeholder="%">
        <span>% 'i nedir?</span>
      </div>
      <div class="pct-result" id="r1">
        <span class="pct-result-num" id="r1v">—</span>
        <span class="pct-result-label" id="r1l"></span>
      </div>
    </div>

    <!-- Mod 2: X, Y'nin yüzde kaçıdır -->
    <div class="pct-card">
      <h3>2. Yüzde oran bul</h3>
      <div class="pct-row">
        <input type="number" id="p2x" placeholder="Küçük sayı">
        <span>,</span>
        <input type="number" id="p2y" placeholder="Büyük sayı">
        <span>sayısının yüzde kaçı?</span>
      </div>
      <div class="pct-result" id="r2">
        <span class="pct-result-num" id="r2v">—</span>
        <span class="pct-result-label" id="r2l"></span>
      </div>
    </div>

    <!-- Mod 3: X'ten Y'ye değişim -->
    <div class="pct-card">
      <h3>3. Yüzde değişim</h3>
      <div class="pct-row">
        <input type="number" id="p3x" placeholder="Eski değer">
        <span>→</span>
        <input type="number" id="p3y" placeholder="Yeni değer">
      </div>
      <div class="pct-result" id="r3">
        <span class="pct-result-num" id="r3v">—</span>
        <span class="pct-result-label" id="r3l"></span>
      </div>
    </div>

  </div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
function fmt(n){return Number.isInteger(n)?String(n):n.toFixed(4).replace(/\.?0+$/,'');}

function calc1(){
  const x=parseFloat(document.getElementById('p1x').value);
  const y=parseFloat(document.getElementById('p1y').value);
  const r=document.getElementById('r1');
  if(isNaN(x)||isNaN(y)){r.style.display='none';return;}
  const res=x*y/100;
  document.getElementById('r1v').textContent=fmt(res);
  document.getElementById('r1l').textContent=x+' sayısının %'+y+'si = '+fmt(res);
  r.style.display='block';
}

function calc2(){
  const x=parseFloat(document.getElementById('p2x').value);
  const y=parseFloat(document.getElementById('p2y').value);
  const r=document.getElementById('r2');
  if(isNaN(x)||isNaN(y)||y===0){r.style.display='none';return;}
  const res=(x/y)*100;
  document.getElementById('r2v').textContent='%'+fmt(res);
  document.getElementById('r2l').textContent=x+', '+y+' sayısının %'+fmt(res)+'si';
  r.style.display='block';
}

function calc3(){
  const x=parseFloat(document.getElementById('p3x').value);
  const y=parseFloat(document.getElementById('p3y').value);
  const r=document.getElementById('r3');
  if(isNaN(x)||isNaN(y)||x===0){r.style.display='none';return;}
  const res=((y-x)/Math.abs(x))*100;
  const isPos=res>=0;
  r.className='pct-result '+(isPos?'pos':'neg');
  document.getElementById('r3v').textContent=(isPos?'+':'')+fmt(res)+'%';
  document.getElementById('r3l').textContent=x+'\'den '+y+'\'ye '+(isPos?'artış':'azalış')+': '+(isPos?'+':'')+fmt(res)+'%';
  r.style.display='block';
}

['p1x','p1y'].forEach(id=>document.getElementById(id).addEventListener('input',calc1));
['p2x','p2y'].forEach(id=>document.getElementById(id).addEventListener('input',calc2));
['p3x','p3y'].forEach(id=>document.getElementById(id).addEventListener('input',calc3));
</script>
