<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Büyük Küçük Harf Dönüştürücü — EbruTech Studios</title>
<meta name="description" content="Metni BÜYÜK harf, küçük harf, camelCase, snake_case, kebab-case ve daha fazlasına çevirin. Türkçe karakter uyumlu. Ücretsiz.">
<link rel="canonical" href="https://ebrutechsystems.com/tool-textcase.html">
<meta property="og:title" content="Büyük Küçük Harf Dönüştürücü — EbruTech Studios"><meta property="og:image" content="https://ebrutechsystems.com/assets/og-image.png"><meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10140a">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1633221257137505" crossorigin="anonymous"></script>
<style>
.ta{width:100%;min-height:150px;padding:14px;border-radius:12px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--txt);font-size:1rem;resize:vertical;line-height:1.6;font-family:inherit}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
@media(max-width:540px){.mode-grid{grid-template-columns:repeat(2,1fr)}}
.mode-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:var(--bg-2);color:var(--txt-dim);font-size:.8rem;cursor:pointer;transition:.15s;text-align:center;line-height:1.3}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn .tag{display:block;font-size:.72rem;color:var(--txt-faint);margin-top:2px;font-family:monospace}
.stats-row{display:flex;gap:16px;font-size:.8rem;color:var(--txt-faint);margin-top:8px;flex-wrap:wrap}
.stats-row span b{color:var(--txt-dim)}
</style>
</head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">Aa Harf Düzeni Dönüştürücü</h1>
<p class="lead" style="margin:14px 0 26px">Metninizi 9 farklı harf düzenine çevirin. Türkçe karakterlere (İ, ı, Ş, Ğ) tam uyumlu.</p>

<textarea id="t" class="ta" placeholder="Metni buraya yazın... Örnek: merhaba dünya nasılsın"></textarea>
<div class="stats-row" id="stats"></div>

<div class="controls" style="margin-top:16px">
<div class="mode-grid">
<button class="mode-btn" data-m="upper">BÜYÜK HARF<span class="tag">UPPER CASE</span></button>
<button class="mode-btn" data-m="lower">küçük harf<span class="tag">lower case</span></button>
<button class="mode-btn" data-m="title">İlk Harfler Büyük<span class="tag">Title Case</span></button>
<button class="mode-btn" data-m="sentence">Cümle düzeni<span class="tag">Sentence case</span></button>
<button class="mode-btn" data-m="camel">develeCümlesi<span class="tag">camelCase</span></button>
<button class="mode-btn" data-m="pascal">BüyükDeveCümlesi<span class="tag">PascalCase</span></button>
<button class="mode-btn" data-m="snake">alt_çizgi_düzeni<span class="tag">snake_case</span></button>
<button class="mode-btn" data-m="kebab">tire-düzeni<span class="tag">kebab-case</span></button>
<button class="mode-btn" data-m="screaming">SABİT_ÇIZGI<span class="tag">SCREAMING_SNAKE</span></button>
</div>
<div style="display:flex;gap:8px">
<button id="copy" class="btn btn-primary" style="flex:1">Kopyala</button>
<button id="clear" class="btn btn-ghost">Temizle</button>
</div>
</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const t=document.getElementById("t");
const trMap={"ş":"s","ç":"c","ğ":"g","ı":"i","ö":"o","ü":"u","Ş":"S","Ç":"C","Ğ":"G","I":"I","Ö":"O","Ü":"U"};
function trUpper(s){return s.replace(/i/g,"İ").replace(/ı/g,"I").toUpperCase();}
function trLower(s){return s.replace(/I/g,"ı").replace(/İ/g,"i").toLowerCase();}
function toLatin(s){return s.replace(/[şçğıöüŞÇĞIÖÜ]/g,c=>trMap[c]||c);}
function words(s){return toLatin(trLower(s)).replace(/[^a-z0-9]+/g," ").trim().split(/\s+/).filter(Boolean);}

function convert(m,s){
  switch(m){
    case"upper":return trUpper(s);
    case"lower":return trLower(s);
    case"title":return s.split(/(\s+)/).map(w=>w.trim()?trUpper(w.charAt(0))+trLower(w.slice(1)):w).join("");
    case"sentence":{const lo=trLower(s);return lo.replace(/(^\s*\w|[.!?]+\s*\w)/g,c=>trUpper(c));}
    case"camel":{const ws=words(s);return ws.map((w,i)=>i===0?w:w.charAt(0).toUpperCase()+w.slice(1)).join("");}
    case"pascal":return words(s).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join("");
    case"snake":return words(s).join("_");
    case"kebab":return words(s).join("-");
    case"screaming":return words(s).join("_").toUpperCase();
    default:return s;
  }
}

function updateStats(){
  const s=t.value;
  const chars=s.length;const words_=(s.trim().match(/\S+/g)||[]).length;const lines=s.split(/\n/).length;
  document.getElementById("stats").innerHTML=
    `<span><b>${chars}</b> karakter</span><span><b>${words_}</b> kelime</span><span><b>${lines}</b> satır</span>`;
}

document.querySelectorAll("[data-m]").forEach(b=>b.onclick=()=>{
  t.value=convert(b.dataset.m,t.value);
  updateStats();
  ETSlib.toast("Dönüştürüldü ✓");
});
document.getElementById("copy").onclick=()=>{if(t.value){navigator.clipboard.writeText(t.value);ETSlib.toast("Kopyalandı ✓");}};
document.getElementById("clear").onclick=()=>{t.value="";updateStats();};
t.oninput=updateStats;
updateStats();
</script></body></html>
