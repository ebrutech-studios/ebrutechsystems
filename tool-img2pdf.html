<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🖼️→📄 Resimden PDF</h1>
<p class="lead" style="margin:14px 0 26px">Birden fazla görseli tek PDF'e dönüştür. Sıralamayı değiştir. Tarayıcıda çalışır.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görselleri seç</b> veya sürükle<br><span style="color:var(--txt-faint);font-size:.85rem">JPG, PNG · birden fazla</span></p><input id="file" type="file" accept="image/*" multiple class="hidden"></div>
<ul id="list" class="controls" style="list-style:none;padding:0"></ul>
<div id="opts" class="controls hidden">
<div class="field"><label>Sayfa boyutu</label><select id="size"><option value="fit">Görsele göre</option><option value="a4">A4 Dikey</option><option value="a4l">A4 Yatay</option></select></div>
<button id="go" class="btn btn-primary">PDF Oluştur & İndir</button></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let files=[];
const dz=document.getElementById("dz"),file=document.getElementById("file"),list=document.getElementById("list"),go=document.getElementById("go"),opts=document.getElementById("opts");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");add(e.dataTransfer.files);};
file.onchange=e=>add(e.target.files);
function add(fl){for(const f of fl){if(f.type.startsWith("image/"))files.push(f);}render();}
function escHtml(s){return String(s).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
function render(){
  list.innerHTML="";
  files.forEach((f,i)=>{const li=document.createElement("li");li.className="card";li.style.cssText="display:flex;align-items:center;gap:12px;padding:10px 14px";
    li.innerHTML=`<span style="font-size:1.2rem">🖼️</span><span style="flex:1;font-size:.88rem">${escHtml(f.name)}</span>
      <button data-up="${i}" class="btn btn-ghost" style="padding:6px 10px">↑</button>
      <button data-dn="${i}" class="btn btn-ghost" style="padding:6px 10px">↓</button>
      <button data-rm="${i}" class="btn btn-ghost" style="padding:6px 10px">✕</button>`;list.appendChild(li);});
  opts.classList.toggle("hidden",files.length<1);
  list.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{const i=+b.dataset.up;if(i>0){[files[i-1],files[i]]=[files[i],files[i-1]];render();}});
  list.querySelectorAll("[data-dn]").forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;if(i<files.length-1){[files[i+1],files[i]]=[files[i],files[i+1]];render();}});
  list.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{files.splice(+b.dataset.rm,1);render();});
}
async function toBytes(f){return new Uint8Array(await f.arrayBuffer());}
go.onclick=async()=>{
  if(!files.length)return;
  try{
    go.textContent="Oluşturuluyor...";go.disabled=true;
    const {PDFDocument}=PDFLib;const pdf=await PDFDocument.create();const size=document.getElementById("size").value;
    for(const f of files){
      const bytes=await toBytes(f);let img;
      if(f.type.includes("png"))img=await pdf.embedPng(bytes);else img=await pdf.embedJpg(bytes);
      let pw,ph;
      if(size==="a4"){pw=595;ph=842;}else if(size==="a4l"){pw=842;ph=595;}else{pw=img.width;ph=img.height;}
      const page=pdf.addPage([pw,ph]);
      const scale=Math.min(pw/img.width,ph/img.height);const w=img.width*scale,h=img.height*scale;
      page.drawImage(img,{x:(pw-w)/2,y:(ph-h)/2,width:w,height:h});
    }
    const out=await pdf.save();const blob=new Blob([out],{type:"application/pdf"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ebrutech-resimler.pdf";a.click();
    ETSlib.toast("PDF indiriliyor ✓");
  }catch(e){console.error(e);ETSlib.toast("Hata: bir görsel okunamadı");}
  finally{go.textContent="PDF Oluştur & İndir";go.disabled=false;}
};
</script></body></html>
