</div>

<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,origName="resim",selFont="Arial, sans-serif",selPos="tl",isBold=true,isItalic=false,hasShadow=false,hasStroke=false;
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),cv=$("cv");

dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};

function load(f){
  origName=(f.name||"resim").replace(/\.[^.]+$/,"");
  const r=new FileReader();
  r.onload=ev=>{
    imgEl=new Image();
    imgEl.onload=()=>{
      $("preview").classList.remove("hidden");
      $("panel").classList.remove("hidden");
      draw();
    };
    imgEl.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

document.querySelectorAll(".font-tab").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".font-tab").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");selFont=b.dataset.font;draw();
  };
});

document.querySelectorAll(".pos-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".pos-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");selPos=b.dataset.pos;draw();
  };
});

$("boldBtn").onclick=()=>{isBold=!isBold;$("boldBtn").classList.toggle("on",isBold);draw();};
$("italicBtn").onclick=()=>{isItalic=!isItalic;$("italicBtn").classList.toggle("on",isItalic);draw();};
$("shadowBtn").onclick=()=>{hasShadow=!hasShadow;$("shadowBtn").classList.toggle("on",hasShadow);draw();};
$("strokeBtn").onclick=()=>{hasStroke=!hasStroke;$("strokeBtn").classList.toggle("on",hasStroke);draw();};

$("size").oninput=()=>{$("sVal").textContent=$("size").value;draw();};
$("op").oninput=()=>{$("oVal").textContent=$("op").value;draw();};
[$("txt"),$("color")].forEach(el=>{el.oninput=draw;el.onchange=draw;});

function draw(){
  if(!imgEl)return;
  cv.width=imgEl.naturalWidth;cv.height=imgEl.naturalHeight;
  const ctx=cv.getContext("2d");
  ctx.drawImage(imgEl,0,0);

  const txt=$("txt").value||"";
  if(!txt)return;

  const fs=Math.round(cv.width*parseInt($("size").value)/100);
  const style=(isBold?"bold ":"")+(isItalic?"italic ":"");
  ctx.font=style+fs+"px "+selFont;
  ctx.fillStyle=$("color").value;
  ctx.globalAlpha=parseInt($("op").value)/100;
  ctx.textBaseline="middle";

  if(hasShadow){ctx.shadowColor="rgba(0,0,0,0.7)";ctx.shadowBlur=fs*0.15;ctx.shadowOffsetX=fs*0.04;ctx.shadowOffsetY=fs*0.04;}
  else{ctx.shadowColor="transparent";ctx.shadowBlur=0;}

  const m=ctx.measureText(txt);
  const tw=m.width,th=fs;
  const pad=fs*0.6;

  if(selPos==="tile"){
    const stepX=tw+fs*2,stepY=th*3;
    ctx.save();ctx.translate(cv.width/2,cv.height/2);ctx.rotate(-Math.PI/8);ctx.translate(-cv.width/2,-cv.height/2);
    for(let y=-stepY;y<cv.height+stepY*2;y+=stepY)
      for(let x=-stepX;x<cv.width+stepX*2;x+=stepX){
        if(hasStroke){ctx.strokeStyle="rgba(0,0,0,0.3)";ctx.lineWidth=fs*0.04;ctx.strokeText(txt,x,y);}
        ctx.fillText(txt,x,y);
      }
    ctx.restore();
  } else {
    let x,y;
    const posMap={
      tl:[pad,pad+th/2],tc:[cv.width/2-tw/2,pad+th/2],tr:[cv.width-tw-pad,pad+th/2],
      ml:[pad,cv.height/2],center:[cv.width/2-tw/2,cv.height/2],mr:[cv.width-tw-pad,cv.height/2],
      bl:[pad,cv.height-pad-th/2],bc:[cv.width/2-tw/2,cv.height-pad-th/2],br:[cv.width-tw-pad,cv.height-pad-th/2]
    };
    [x,y]=posMap[selPos]||posMap.br;
    if(hasStroke){ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=fs*0.06;ctx.shadowColor="transparent";ctx.strokeText(txt,x,y);ctx.shadowColor=hasShadow?"rgba(0,0,0,0.7)":"transparent";}
    ctx.fillText(txt,x,y);
  }
  ctx.globalAlpha=1;ctx.shadowColor="transparent";ctx.shadowBlur=0;

  $("infoStrip").innerHTML=`<span>Boyut: <strong>${cv.width} × ${cv.height} px</strong></span><span>Metin: <strong>${txt}</strong></span><span>Yazı Boyutu: <strong>${fs}px</strong></span>`;
}

$("go").onclick=()=>{
  if(!imgEl)return;
  cv.toBlob(b=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download=origName+"-filigranli.png";a.click();
    ETSlib.toast("Filigran eklendi & indirildi ✓");
  },"image/png");
};
</script></body></html>
