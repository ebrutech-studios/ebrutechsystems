<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">🔗 URL Slug Oluşturucu</h1>
  <p class="lead" style="margin:14px 0 26px">Başlığı yapıştır, SEO uyumlu slug'ı kopyala. Türkçe karakter desteği ile.</p>

  <div class="field" style="margin-bottom:16px">
    <label>Başlık veya metin</label>
    <input id="inputText" type="text" placeholder="Örn: Türkçe Karakter Destekli Blog Başlığı" autocomplete="off" style="font-size:1rem">
  </div>

  <div class="field" style="margin-bottom:20px">
    <label style="display:flex;align-items:center;justify-content:space-between">
      <span>URL Slug</span>
      <button id="copyBtn" class="btn btn-ghost" style="padding:5px 14px;font-size:.82rem;min-height:auto">Kopyala</button>
    </label>
    <input id="outputSlug" type="text" readonly placeholder="slug-buraya-gelecek" style="font-size:1rem;font-family:var(--font-body);letter-spacing:.02em;background:rgba(200,255,46,.04);border-color:rgba(200,255,46,.2)">
  </div>

  <div id="slugPreview" style="display:none;padding:14px 18px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:.85rem;color:var(--txt-dim);word-break:break-all">
    <span style="color:var(--txt-faint)">https://siteniz.com/</span><span id="slugPreviewText" style="color:var(--accent);font-weight:700"></span>
  </div>

  <div style="margin-top:22px;display:flex;gap:16px;flex-wrap:wrap">
    <div style="font-size:.82rem;color:var(--txt-faint)">✓ ş→s, ç→c, ğ→g, ı→i, ö→o, ü→u</div>
    <div style="font-size:.82rem;color:var(--txt-faint)">✓ Boşluklar tire olur</div>
    <div style="font-size:.82rem;color:var(--txt-faint)">✓ Özel karakterler temizlenir</div>
  </div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
function toSlug(str){
  return str
    .replace(/[ŞŞ]/g,'s').replace(/[şş]/g,'s')
    .replace(/[ÇÇ]/g,'c').replace(/[çç]/g,'c')
    .replace(/[ĞĞ]/g,'g').replace(/[ğğ]/g,'g')
    .replace(/İ/g,'i').replace(/ı/g,'i')
    .replace(/[ÖÖ]/g,'o').replace(/[öö]/g,'o')
    .replace(/[ÜÜ]/g,'u').replace(/[üü]/g,'u')
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g,'')
    .trim()
    .replace(/[\s]+/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-+|-+$/g,'');
}

const inp=document.getElementById('inputText');
const out=document.getElementById('outputSlug');
const preview=document.getElementById('slugPreview');
const previewText=document.getElementById('slugPreviewText');

inp.addEventListener('input',function(){
  const slug=toSlug(this.value);
  out.value=slug;
  if(slug){preview.style.display='block';previewText.textContent=slug;}
  else{preview.style.display='none';}
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  if(!out.value) return;
  navigator.clipboard.writeText(out.value).then(()=>{
    ETSlib.toast('Slug kopyalandı ✓');
  }).catch(()=>{
    out.select();document.execCommand('copy');
    ETSlib.toast('Slug kopyalandı ✓');
  });
});
</script>
</body>
