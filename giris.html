<link rel="stylesheet" href="assets/css/site.css"></head><body>
<section class="hero"><div class="wrap"><div class="tool-shell" style="max-width:440px">
<span class="eyebrow">Hesap</span>
<h1 id="title" style="font-size:2.2rem">Giriş Yap</h1>
<p class="lead" style="margin:14px 0 26px" id="sub">Pro üyeliğini açmak ve gelişmiş araçlara erişmek için giriş yap.</p>

<div id="loggedIn" class="card hidden" style="text-align:center;padding:34px">
  <div style="font-size:2.2rem;margin-bottom:8px">👋</div>
  <h3 id="welcomeTxt" style="margin-bottom:6px">Hoş geldin</h3>
  <p id="proStatus" style="color:var(--txt-dim);margin-bottom:20px"></p>
  <div class="row"><a href="tools.html" class="btn btn-primary">Araçlara Git</a><button id="logoutBtn" class="btn btn-ghost">Çıkış Yap</button></div>
</div>

<div id="authBox" class="card">
  <button id="googleBtn" class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:16px">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.6l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.4 36.1 44 30.6 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
    Google ile devam et
  </button>
  <div style="text-align:center;color:var(--txt-faint);font-size:.82rem;margin:6px 0 16px">veya e-posta ile</div>
  <div id="msg" style="display:none;padding:10px 12px;border-radius:10px;font-size:.86rem;margin-bottom:14px"></div>
  <div class="field" style="margin-bottom:12px"><label>E-posta</label><input id="email" type="email" placeholder="ornek@mail.com"></div>
  <div class="field" style="margin-bottom:18px"><label>Şifre</label><input id="pass" type="password" placeholder="••••••••"></div>
  <button id="submitBtn" class="btn btn-primary" style="width:100%;justify-content:center">Giriş Yap</button>
  <div style="text-align:center;margin-top:16px;font-size:.88rem;color:var(--txt-dim)">
    <span id="switchTxt">Hesabın yok mu?</span>
    <a id="switchLink" style="color:var(--accent);cursor:pointer;font-weight:600">Kayıt ol</a>
  </div>
  <div style="text-align:center;margin-top:10px">
    <a id="forgotLink" style="color:var(--txt-faint);cursor:pointer;font-size:.82rem">Şifremi unuttum</a>
  </div>
</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let mode="login"; // login | register
function show(el){el.style.display="block";}
function msg(text,ok){const m=document.getElementById("msg");m.style.display="block";
  m.style.background=ok?"rgba(200,255,46,.12)":"rgba(255,80,80,.12)";m.style.color=ok?"var(--accent)":"#ff8080";m.textContent=text;}

function renderMode(){
  document.getElementById("title").textContent=mode==="login"?"Giriş Yap":"Kayıt Ol";
  document.getElementById("submitBtn").textContent=mode==="login"?"Giriş Yap":"Hesap Oluştur";
  document.getElementById("switchTxt").textContent=mode==="login"?"Hesabın yok mu?":"Zaten hesabın var mı?";
  document.getElementById("switchLink").textContent=mode==="login"?"Kayıt ol":"Giriş yap";
}
document.getElementById("switchLink").onclick=()=>{mode=mode==="login"?"register":"login";renderMode();};

function errText(e){
  const c=(e&&e.code)||"";
  if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found"))return "E-posta veya şifre hatalı.";
  if(c.includes("email-already-in-use"))return "Bu e-posta zaten kayıtlı. Giriş yapmayı dene.";
  if(c.includes("weak-password"))return "Şifre en az 6 karakter olmalı.";
  if(c.includes("invalid-email"))return "Geçersiz e-posta adresi.";
  if(c.includes("popup-closed"))return "Google penceresi kapatıldı.";
  if(c.includes("unauthorized-domain"))return "Bu domain Firebase'de yetkili değil (ayar gerekiyor).";
  return "Bir hata oluştu. Tekrar dene.";
}

document.getElementById("submitBtn").onclick=async()=>{
  const email=document.getElementById("email").value.trim();
  const pass=document.getElementById("pass").value;
  if(!email||!pass){msg("E-posta ve şifre gerekli.",false);return;}
  try{
    if(mode==="login")await window.ETSAuth.loginEmail(email,pass);
    else{await window.ETSAuth.registerEmail(email,pass);msg("Hesap oluşturuldu! Giriş yapılıyor...",true);}
  }catch(e){msg(errText(e),false);}
};
document.getElementById("googleBtn").onclick=async()=>{
  try{await window.ETSAuth.loginGoogle();}catch(e){msg(errText(e),false);}
};
document.getElementById("forgotLink").onclick=async()=>{
  const email=document.getElementById("email").value.trim();
  if(!email){msg("Önce e-posta adresini gir, sonra 'Şifremi unuttum'a bas.",false);return;}
  try{await window.ETSAuth.resetPassword(email);msg("Şifre sıfırlama linki e-postana gönderildi.",true);}
  catch(e){msg(errText(e),false);}
};
document.getElementById("logoutBtn").onclick=()=>window.ETSAuth.logout();

document.addEventListener("ets-auth",(e)=>{
  const {user,isPro}=e.detail;
  if(user){
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("loggedIn").classList.remove("hidden");
    document.getElementById("welcomeTxt").textContent="Hoş geldin, "+(user.displayName||user.email.split("@")[0]);
    if(isPro){
      let txt='✓ Pro üyeliğin aktif';
      const pu=window.ETSAuth.proUntil;
      if(pu){const g=Math.ceil((pu-Date.now())/86400000);txt+=' · '+pu.toLocaleDateString('tr-TR')+' tarihine kadar ('+g+' gün)';}
      document.getElementById("proStatus").innerHTML='<span style="color:var(--accent);font-weight:700">'+txt+'</span>';
    }else{
      document.getElementById("proStatus").innerHTML='Üyelik: Ücretsiz · <a href="fiyatlandirma.html" style="color:var(--accent)">Pro\'ya geç</a>';
    }
  }else{
    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("loggedIn").classList.add("hidden");
  }
});
renderMode();
</script></body></html>
