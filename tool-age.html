<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🎂 Yaş Hesaplama</h1>
<p class="lead" style="margin:14px 0 26px">Doğum tarihinizi girin; yaşınızı, doğduğunuz günü ve sonraki doğum gününüzü hesaplayalım.</p>
<div class="controls">
<div class="field"><label>Doğum Tarihi</label><input id="dob" type="date"></div>
<div class="field"><label>Hesaplama Tarihi <span style="color:var(--txt-faint);font-weight:400">(varsayılan bugün)</span></label><input id="target" type="date"></div>
<button id="go" class="btn btn-primary btn-lg" style="width:100%">Hesapla</button>
</div>
<div id="resultArea" style="display:none;margin-top:24px">
<div class="age-big">
  <div class="main-val" id="mainAge"></div>
  <div class="sub-val" id="subAge"></div>
</div>
<div class="age-grid" id="cards"></div>
<div class="info-row" id="infoRow"></div>
<div class="bday-box" id="bdayBox"></div>
</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
document.getElementById("target").valueAsDate=new Date();
const DAYS=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const zodiac=[
  ["Oğlak","♑",1,20],["Kova","♒",2,18],["Balık","♓",3,20],["Koç","♈",4,20],
  ["Boğa","♉",5,21],["İkizler","♊",6,21],["Yengeç","♋",7,23],["Aslan","♌",8,23],
  ["Başak","♍",9,23],["Terazi","♎",10,23],["Akrep","♏",11,22],["Yay","♐",12,22],["Oğlak","♑",12,31]
];
function getZodiac(m,d){
  for(let i=0;i<zodiac.length-1;i++){const z=zodiac[i];if(m<z[2]||(m===z[2]&&d<z[3]))return{name:z[0],sym:z[1]};}
  return{name:"Oğlak",sym:"♑"};
}
function card(v,l){return `<div class="age-card"><div class="v">${v}</div><div class="l">${l}</div></div>`;}

document.getElementById("go").onclick=()=>{
  const dob=document.getElementById("dob").valueAsDate;
  const target=document.getElementById("target").valueAsDate||new Date();
  if(!dob){ETSlib.toast("Doğum tarihi gir");return;}
  if(dob>target){ETSlib.toast("Doğum tarihi ileride olamaz");return;}

  let y=target.getFullYear()-dob.getFullYear();
  let m=target.getMonth()-dob.getMonth();
  let d=target.getDate()-dob.getDate();
  if(d<0){m--;d+=new Date(target.getFullYear(),target.getMonth(),0).getDate();}
  if(m<0){y--;m+=12;}
  const gun=Math.floor((target-dob)/86400000);
  const hafta=Math.floor(gun/7);
  const saat=gun*24;
  const dobMonth=dob.getMonth()+1,dobDay=dob.getDate();

  // next birthday
  let nextBday=new Date(target.getFullYear(),dob.getMonth(),dob.getDate());
  if(nextBday<=target)nextBday.setFullYear(nextBday.getFullYear()+1);
  const daysUntilBday=Math.ceil((nextBday-target)/86400000);
  const isBirthdayToday=(dob.getMonth()===target.getMonth()&&dob.getDate()===target.getDate());

  // zodiac
  const {name:zName,sym:zSym}=getZodiac(dobMonth,dobDay);

  // born day of week
  const bornDay=DAYS[dob.getDay()];
  const bornDate=`${dob.getDate()} ${MONTHS[dob.getMonth()]} ${dob.getFullYear()}`;

  document.getElementById("mainAge").textContent=y;
  document.getElementById("subAge").textContent=`${y} yıl ${m} ay ${d} gün`;

  document.getElementById("cards").innerHTML=
    card(gun.toLocaleString("tr-TR"),"Toplam Gün")+
    card(hafta.toLocaleString("tr-TR"),"Toplam Hafta")+
    card((y*12+m).toLocaleString("tr-TR"),"Toplam Ay")+
    card(saat.toLocaleString("tr-TR"),"Toplam Saat")+
    card((gun*24*60).toLocaleString("tr-TR"),"Toplam Dakika")+
    card((y+1)+"","Sonraki Yaş");

  document.getElementById("infoRow").innerHTML=
    `<div class="info-box"><div class="il">Doğduğunuz Gün</div><div class="iv">${bornDay}, ${bornDate}</div></div>`+
    `<div class="info-box"><div class="il">Burç</div><div class="iv">${zSym} ${zName}</div></div>`;

  document.getElementById("bdayBox").innerHTML=isBirthdayToday
    ? `<div style="font-size:1.5rem">🎉</div><div style="font-weight:700;margin-top:6px">Doğum Günün Kutlu Olsun!</div>`
    : `<div style="font-size:.82rem;color:var(--txt-faint);margin-bottom:4px">Sonraki Doğum Gününe</div><div style="font-family:var(--font-display);font-size:2rem;color:var(--accent)">${daysUntilBday} gün</div><div style="font-size:.82rem;color:var(--txt-faint);margin-top:4px">${nextBday.getDate()} ${MONTHS[nextBday.getMonth()]} ${nextBday.getFullYear()}</div>`;

  document.getElementById("resultArea").style.display="block";
  ETSlib.toast("Hesaplandı ✓");
};
</script></body></html>
