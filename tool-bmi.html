.bmi-table th{text-align:left;padding:8px 12px;color:var(--txt-faint);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}

<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">VKİ / BMI Hesaplama</h1>
  <p class="lead" style="margin:14px 0 26px">Boy ve kilonuzu girin — Vücut Kitle İndeksinizi ve ideal kilo aralığınızı öğrenin.</p>

  <div class="bmi-grid">
    <div class="bmi-field">
      <label>Boy</label>
      <input class="bmi-input" id="bmiH" type="number" min="100" max="250" placeholder="170" inputmode="numeric">
      <span class="bmi-unit">santimetre (cm)</span>
    </div>
    <div class="bmi-field">
      <label>Kilo</label>
      <input class="bmi-input" id="bmiW" type="number" min="20" max="400" placeholder="70" inputmode="decimal">
      <span class="bmi-unit">kilogram (kg)</span>
    </div>
  </div>

  <div class="bmi-result" id="bmiResult">
    <div class="bmi-val" id="bmiVal"></div>
    <div class="bmi-cat" id="bmiCat"></div>
    <div class="bmi-gauge"><div class="bmi-gauge-arrow" id="bmiArrow" style="left:0"></div></div>
    <div class="bmi-gauge-labels"><span>Zayıf</span><span>Normal</span><span>Fazla Kilolu</span><span>Obez</span></div>
    <div class="bmi-ideal" id="bmiIdeal"></div>
  </div>

  <table class="bmi-table">
    <thead><tr><th>Kategori</th><th>VKİ Aralığı</th></tr></thead>
    <tbody>
      <tr id="rUnder"><td><span class="cat-dot" style="background:#5599ff"></span>Zayıf</td><td>&lt; 18.5</td></tr>
      <tr id="rNorm"><td><span class="cat-dot" style="background:#c8ff2e"></span>Normal</td><td>18.5 – 24.9</td></tr>
      <tr id="rOver"><td><span class="cat-dot" style="background:#ffb020"></span>Fazla Kilolu</td><td>25.0 – 29.9</td></tr>
      <tr id="rObese"><td><span class="cat-dot" style="background:#ff5050"></span>Obez</td><td>≥ 30.0</td></tr>
    </tbody>
  </table>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const CATS=[
  {lbl:"Zayıf",     col:"#5599ff", max:18.5, gaugeP:0},
  {lbl:"Normal",    col:"#c8ff2e", max:25.0, gaugeP:23},
  {lbl:"Fazla Kilolu",col:"#ffb020",max:30.0,gaugeP:49},
  {lbl:"Obez",      col:"#ff5050", max:99,   gaugeP:74}
];
function calc(){
  const h=parseFloat(document.getElementById("bmiH").value);
  const w=parseFloat(document.getElementById("bmiW").value);
  const res=document.getElementById("bmiResult");
  if(!h||!w||h<100||h>250||w<20){res.style.display="none";return;}
  const hm=h/100;
  const bmi=w/(hm*hm);
  const bmiR=Math.round(bmi*10)/10;
  const cat=CATS.find(c=>bmi<c.max)||CATS[3];
  res.style.display="block";
  document.getElementById("bmiVal").textContent=bmiR.toFixed(1);
  document.getElementById("bmiVal").style.color=cat.col;
  document.getElementById("bmiCat").textContent=cat.lbl;
  document.getElementById("bmiCat").style.color=cat.col;
  const minIdeal=18.5*hm*hm, maxIdeal=24.9*hm*hm;
  document.getElementById("bmiIdeal").innerHTML="<b>İdeal kilo aralığın:</b> "+minIdeal.toFixed(1)+" – "+maxIdeal.toFixed(1)+" kg · Fark: "+(w-maxIdeal>0?"+":"")+(w-maxIdeal>0?(w-maxIdeal).toFixed(1)+" kg fazla":(minIdeal-w>0?(minIdeal-w).toFixed(1)+" kg eksik":"İdeal aralıkta"));
  const gaugeP=Math.min(96,Math.max(2,cat.gaugeP+(bmi-cat.gaugeP<18.5?0:0)+((bmi-(CATS[CATS.indexOf(cat)-1]?.max||0))/(cat.max-(CATS[CATS.indexOf(cat)-1]?.max||0)))*23));
  const pct=Math.min(97,Math.max(3,CATS.indexOf(cat)*25+((bmi-(CATS[CATS.indexOf(cat)-1]?.max||0))/(cat.max-(CATS[CATS.indexOf(cat)-1]?.max||2)))*25));
  document.getElementById("bmiArrow").style.left=pct.toFixed(1)+"%";
  document.querySelectorAll(".bmi-table tr[id]").forEach(r=>r.classList.remove("current"));
  const map={Zayıf:"rUnder",Normal:"rNorm","Fazla Kilolu":"rOver","Obez":"rObese"};
  if(map[cat.lbl]) document.getElementById(map[cat.lbl]).classList.add("current");
}
document.getElementById("bmiH").addEventListener("input",calc);
document.getElementById("bmiW").addEventListener("input",calc);
</script>
