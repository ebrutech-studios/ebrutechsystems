<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">📐 Birim Dönüştürücü</h1>
<p class="lead" style="margin:14px 0 26px">Uzunluk, ağırlık, sıcaklık ve daha fazlası arasında anında dönüştürün. Tüm sonuçları aynı anda görün.</p>

<div class="cat-tabs" id="catTabs"></div>

<div class="controls">
<div class="unit-main">
<div class="field" style="margin:0">
  <label>Değer</label>
  <input id="val" type="number" value="1" style="font-size:1.1rem;font-weight:600">
</div>
<button class="swap-btn" id="swapBtn" title="Birimleri Yer Değiştir">⇄</button>
<div class="field" style="margin:0">
  <label>Kaynak Birim</label>
  <select id="from" style="font-weight:600"></select>
</div>
</div>

<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px">
  <div style="font-size:.8rem;color:var(--txt-faint);margin-bottom:10px">Tüm dönüşümler — satıra tıklayınca kopyalanır</div>
  <table class="all-table" id="allTable"></table>
</div>
</div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const units={
  "Uzunluk":{
    labels:{mm:"Milimetre (mm)",cm:"Santimetre (cm)",m:"Metre (m)",km:"Kilometre (km)",inch:"İnç (in)",foot:"Ayak (ft)",yard:"Yarda (yd)",mil:"Mil (mi)",deniz_mili:"Deniz Mili"},
    toBase:{mm:0.001,cm:0.01,m:1,km:1000,inch:0.0254,foot:0.3048,yard:0.9144,mil:1609.344,deniz_mili:1852}
  },
  "Ağırlık":{
    labels:{mg:"Miligram (mg)",g:"Gram (g)",kg:"Kilogram (kg)",ton:"Metrik Ton (t)",lb:"Libre (lb)",ons:"Ons (oz)",karat:"Karat (ct)"},
    toBase:{mg:0.000001,g:0.001,kg:1,ton:1000,lb:0.453592,ons:0.0283495,karat:0.0002}
  },
  "Alan":{
    labels:{"mm2":"mm²","cm2":"cm²","m2":"m²","km2":"km²","hektar":"Hektar (ha)","donum":"Dönüm","ft2":"ft²","acre":"Acre"},
    toBase:{"mm2":0.000001,"cm2":0.0001,"m2":1,"km2":1000000,"hektar":10000,"donum":1000,"ft2":0.092903,"acre":4046.86}
  },
  "Hacim":{
    labels:{ml:"Mililitre (ml)",cl:"Santilitre (cl)",dl:"Desilitre (dl)",litre:"Litre (l)",m3:"Metreküp (m³)",galon:"Galon (gal)",pint:"Pint",fl_oz:"Sıvı Ons (fl oz)"},
    toBase:{ml:0.001,cl:0.01,dl:0.1,litre:1,m3:1000,galon:3.78541,pint:0.473176,fl_oz:0.0295735}
  },
  "Hız":{
    labels:{"ms":"m/s","kmh":"km/s","mph":"Mil/sa (mph)","knot":"Knot","mach":"Mach"},
    toBase:{"ms":1,"kmh":0.277778,"mph":0.44704,"knot":0.514444,"mach":340.29}
  },
  "Sıcaklık":{
    labels:{"C":"Celsius (°C)","F":"Fahrenheit (°F)","K":"Kelvin (K)"},
    special:true
  },
  "Veri":{
    labels:{bit:"Bit",B:"Byte (B)",KB:"Kilobayt (KB)",MB:"Megabayt (MB)",GB:"Gigabayt (GB)",TB:"Terabayt (TB)"},
    toBase:{bit:0.125,B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776}
  },
  "Zaman":{
    labels:{ms:"Milisaniye",sn:"Saniye",dk:"Dakika",saat:"Saat",gun:"Gün",hafta:"Hafta",ay:"Ay (30 gün)",yil:"Yıl (365 gün)"},
    toBase:{ms:0.001,sn:1,dk:60,saat:3600,gun:86400,hafta:604800,ay:2592000,yil:31536000}
  }
};

let currentCat="Uzunluk";
const catTabs=document.getElementById("catTabs"),fromSel=document.getElementById("from"),valInp=document.getElementById("val"),allTable=document.getElementById("allTable");

function fmtNum(n){
  if(Math.abs(n)>=1e9)return n.toExponential(4);
  if(Math.abs(n)<0.0001&&n!==0)return n.toExponential(4);
  return n.toLocaleString("tr-TR",{maximumFractionDigits:6});
}

function toBase(val,key){
  const cat=units[currentCat];
  if(cat.special){
    if(key==="C")return val;
    if(key==="F")return (val-32)*5/9;
    return val-273.15;
  }
  return val*cat.toBase[key];
}
function fromBase(base,key){
  const cat=units[currentCat];
  if(cat.special){
    if(key==="C")return base;
    if(key==="F")return base*9/5+32;
    return base+273.15;
  }
  return base/cat.toBase[key];
}

function calc(){
  const cat=units[currentCat];
  const v=parseFloat(valInp.value)||0;
  const fk=fromSel.value;
  const base=toBase(v,fk);
  const keys=Object.keys(cat.labels);
  allTable.innerHTML=keys.map(k=>{
    const result=fromBase(base,k);
    const isActive=k===fk;
    return `<tr class="${isActive?"highlight":""}" onclick="navigator.clipboard.writeText('${fmtNum(result)}');ETSlib.toast('${cat.labels[k].replace(/'/g,"")}: ${fmtNum(result)} kopyalandı ✓')">
      <td>${cat.labels[k]}</td><td>${fmtNum(result)}</td></tr>`;
  }).join("");
}

function setCategory(c){
  currentCat=c;
  document.querySelectorAll(".cat-tab").forEach(t=>t.classList.toggle("active",t.dataset.c===c));
  const cat=units[c];
  const keys=Object.keys(cat.labels);
  fromSel.innerHTML=keys.map(k=>`<option value="${k}">${cat.labels[k]}</option>`).join("");
  calc();
}

catTabs.innerHTML=Object.keys(units).map(c=>`<button class="cat-tab" data-c="${c}">${c}</button>`).join("");
catTabs.querySelectorAll(".cat-tab").forEach(t=>t.onclick=()=>setCategory(t.dataset.c));
fromSel.onchange=calc;
valInp.oninput=calc;
document.getElementById("swapBtn").onclick=()=>{
  const keys=Object.keys(units[currentCat].labels);
  const cur=fromSel.selectedIndex;
  fromSel.selectedIndex=(cur+1)%keys.length;
  calc();
};
setCategory("Uzunluk");
</script></body></html>
