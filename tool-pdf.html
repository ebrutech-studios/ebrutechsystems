<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Birleştirici — EbruTech Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script></head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">📄 PDF Birleştirici</h1>
<p class="lead" style="margin:14px 0 26px">Birden fazla PDF'i tek dosyada birleştir. Sıralamayı sürükleyerek değiştir. Dosyalar cihazından çıkmaz.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>PDF dosyalarını seç</b> veya sürükle<br><span style="color:var(--txt-faint);font-size:.85rem">Birden fazla seçebilirsin</span></p><input id="file" type="file" accept="application/pdf" multiple class="hidden"></div>
<ul id="list" class="controls" style="list-style:none;padding:0"></ul>
<button id="go" class="btn btn-primary hidden">PDF'leri Birleştir & İndir</button>
<p id="info" style="color:var(--txt-faint);font-size:.86rem;margin-top:10px"></p>
</div></div></section>
<script src="assets/js/site.js"></script>
<script>
let files=[];
const dz=document.getElementById("dz"),file=document.getElementById("file"),list=document.getElementById("list"),go=document.getElementById("go");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");add(e.dataTransfer.files);};
file.onchange=e=>add(e.target.files);
function add(fl){for(const f of fl){if(f.type==="application/pdf")files.push(f);}render();}
function render(){
  list.innerHTML="";
  files.forEach((f,i)=>{
    const li=document.createElement("li");li.className="card";li.style.cssText="display:flex;align-items:center;gap:12px;padding:12px 14px";
    li.innerHTML=`<span style="font-size:1.3rem">📄</span><span style="flex:1;font-size:.9rem">${f.name}</span>
      <button data-up="${i}" class="btn btn-ghost" style="padding:6px 10px">↑</button>
      <button data-dn="${i}" class="btn btn-ghost" style="padding:6px 10px">↓</button>
      <button data-rm="${i}" class="btn btn-ghost" style="padding:6px 10px">✕</button>`;
    list.appendChild(li);
  });
  go.classList.toggle("hidden",files.length<2);
  document.getElementById("info").textContent=files.length?files.length+" PDF seçildi":"";
  list.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{const i=+b.dataset.up;if(i>0){[files[i-1],files[i]]=[files[i],files[i-1]];render();}});
  list.querySelectorAll("[data-dn]").forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;if(i<files.length-1){[files[i+1],files[i]]=[files[i],files[i+1]];render();}});
  list.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{files.splice(+b.dataset.rm,1);render();});
}
go.onclick=async()=>{
  try{
    go.textContent="Birleştiriliyor...";go.disabled=true;
    const {PDFDocument}=PDFLib;const out=await PDFDocument.create();
    for(const f of files){
      const buf=await f.arrayBuffer();const src=await PDFDocument.load(buf,{ignoreEncryption:true});
      const pages=await out.copyPages(src,src.getPageIndices());pages.forEach(p=>out.addPage(p));
    }
    const bytes=await out.save();
    const blob=new Blob([bytes],{type:"application/pdf"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ebrutech-birlesik.pdf";a.click();
    ETSlib.toast("PDF indiriliyor ✓");
  }catch(e){ETSlib.toast("Hata: bir PDF okunamadı");console.error(e);}
  finally{go.textContent="PDF'leri Birleştir & İndir";go.disabled=false;}
};
</script></body></html>
