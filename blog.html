<meta property="og:type" content="website"><meta property="og:site_name" content="EbruTech Studios">
<meta property="og:title" content="Blog — Rehberler ve İpuçları | EbruTech Studios">
<meta property="og:description" content="Görsel araçlar, PDF ve dijital çözümler hakkında pratik rehberler.">

<link rel="stylesheet" href="assets/css/site.css"></head><body>
<section class="hero" style="padding-bottom:24px"><div class="wrap">
<span class="eyebrow">Blog</span><h1>Rehberler ve ipuçları</h1>
<p class="lead" style="margin-top:16px">Araçlarımızı en iyi şekilde kullanmanız için pratik anlatımlar ve dijital çözüm önerileri.</p>
</div></section>
<section style="padding-top:10px"><div class="wrap"><div id="list" class="grid g-2"></div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/blog-data.js"></script>
<script src="assets/js/site.js"></script>
<script>
const list=document.getElementById("list");
const posts=(window.BLOG_POSTS||[]).slice().sort((a,b)=>b.tarih.localeCompare(a.tarih));
list.innerHTML=posts.map(p=>`<a class="card reveal" href="yazi.html?id=${p.id}" style="display:flex;flex-direction:column;gap:10px">
<span class="eyebrow" style="margin:0">${new Date(p.tarih).toLocaleDateString('tr-TR')} · ${p.okuma} dk</span>
<h3 style="font-size:1.2rem">${p.baslik}</h3>
<p style="color:var(--txt-dim);font-size:.92rem;flex:1">${p.ozet}</p>
<span style="color:var(--accent);font-weight:600;font-size:.9rem">Devamını oku →</span></a>`).join("");
</script></body></html>
