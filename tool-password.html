<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Şifre Üreticisi — EbruTech Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css"></head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔑 Şifre Üreticisi</h1>
<p class="lead" style="margin:14px 0 26px">Güçlü, rastgele şifreler oluştur. Tamamen cihazında üretilir, hiçbir yere gönderilmez.</p>
<div class="card" style="text-align:center;padding:24px;margin-bottom:18px">
<div id="pw" style="font-family:monospace;font-size:1.4rem;font-weight:700;word-break:break-all;letter-spacing:.04em">••••••••••••</div>
<button id="copy" class="btn btn-ghost" style="margin-top:14px">Kopyala</button></div>
<div class="controls">
<div class="field"><label>Uzunluk: <span id="lenVal">16</span></label><input id="len" type="range" min="6" max="40" value="16"></div>
<label style="display:flex;gap:8px;align-items:center;color:var(--txt-dim);font-size:.9rem"><input id="upper" type="checkbox" checked style="width:auto"> Büyük harf (A-Z)</label>
<label style="display:flex;gap:8px;align-items:center;color:var(--txt-dim);font-size:.9rem"><input id="lower" type="checkbox" checked style="width:auto"> Küçük harf (a-z)</label>
<label style="display:flex;gap:8px;align-items:center;color:var(--txt-dim);font-size:.9rem"><input id="num" type="checkbox" checked style="width:auto"> Rakam (0-9)</label>
<label style="display:flex;gap:8px;align-items:center;color:var(--txt-dim);font-size:.9rem"><input id="sym" type="checkbox" checked style="width:auto"> Sembol (!@#$...)</label>
<button id="gen" class="btn btn-primary">Yeni Şifre Üret</button>
</div></div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const len=document.getElementById("len"),pw=document.getElementById("pw");
len.oninput=()=>{document.getElementById("lenVal").textContent=len.value;gen();};
function gen(){
  let set="";
  if(document.getElementById("upper").checked)set+="ABCDEFGHJKLMNPQRSTUVWXYZ";
  if(document.getElementById("lower").checked)set+="abcdefghijkmnpqrstuvwxyz";
  if(document.getElementById("num").checked)set+="23456789";
  if(document.getElementById("sym").checked)set+="!@#$%^&*-_=+?";
  if(!set){pw.textContent="En az bir tür seç";return;}
  const n=+len.value;const arr=new Uint32Array(n);crypto.getRandomValues(arr);
  let out="";for(let i=0;i<n;i++)out+=set[arr[i]%set.length];pw.textContent=out;
}
["upper","lower","num","sym"].forEach(id=>document.getElementById(id).onchange=gen);
document.getElementById("gen").onclick=gen;
document.getElementById("copy").onclick=()=>{const t=pw.textContent;if(t.length>6){navigator.clipboard.writeText(t);ETSlib.toast("Şifre kopyalandı ✓");}};
gen();
</script></body></html>
