<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔐 Güçlü Şifre Üretici</h1>
<p class="lead" style="margin:14px 0 26px">Kırılması zor, güvenli şifreler oluştur. Tamamen cihazında çalışır, hiçbir şifre kaydedilmez.</p>
<div class="controls">
<div class="field"><label>Oluşturulan Şifre</label>
<div style="display:flex;gap:8px"><input id="pw" readonly style="font-family:monospace;font-size:1.05rem;flex:1">
<button id="copy" class="btn btn-ghost" style="white-space:nowrap">Kopyala</button></div></div>
<div id="strength" style="height:8px;border-radius:6px;background:var(--bg-2);overflow:hidden;margin-top:-4px">
<div id="sbar" style="height:100%;width:0;transition:.3s"></div></div>
<div id="slabel" style="font-size:.82rem;color:var(--txt-faint);margin-top:2px"></div>
<div class="field"><label>Uzunluk: <span id="lenVal">16</span> karakter</label><input id="len" type="range" min="6" max="40" value="16"></div>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.92rem"><input id="upper" type="checkbox" checked style="width:auto"> Büyük harf (A-Z)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.92rem"><input id="lower" type="checkbox" checked style="width:auto"> Küçük harf (a-z)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.92rem"><input id="num" type="checkbox" checked style="width:auto"> Rakam (0-9)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.92rem"><input id="sym" type="checkbox" checked style="width:auto"> Sembol (!@#$...)</label>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.92rem"><input id="easy" type="checkbox" style="width:auto"> Karışan karakterleri çıkar (0/O, 1/l/I)</label>
<button id="gen" class="btn btn-primary">Yeni Şifre Üret</button></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const $=id=>document.getElementById(id);
const len=$("len");len.oninput=()=>{$("lenVal").textContent=len.value;gen();};
["upper","lower","num","sym","easy"].forEach(id=>$(id).onchange=gen);
function gen(){
  let U="ABCDEFGHIJKLMNOPQRSTUVWXYZ",L="abcdefghijklmnopqrstuvwxyz",N="0123456789",S="!@#$%^&*()-_=+[]{}";
  if($("easy").checked){U=U.replace(/[OI]/g,"");L=L.replace(/[l]/g,"");N=N.replace(/[01]/g,"");}
  let pool="";if($("upper").checked)pool+=U;if($("lower").checked)pool+=L;if($("num").checked)pool+=N;if($("sym").checked)pool+=S;
  if(!pool){$("pw").value="";ETSlib.toast("En az bir seçenek aç");return;}
  const n=parseInt(len.value);let pw="";
  const arr=new Uint32Array(n);crypto.getRandomValues(arr);
  for(let i=0;i<n;i++)pw+=pool[arr[i]%pool.length];
  $("pw").value=pw;strength(pw,pool.length);
}
function strength(pw,poolSize){
  const bits=pw.length*Math.log2(poolSize||1);
  const bar=$("sbar"),lbl=$("slabel");
  let pct,color,text;
  if(bits<40){pct=30;color="#ff5555";text="Zayıf";}
  else if(bits<60){pct=55;color="#ffaa33";text="Orta";}
  else if(bits<80){pct=80;color="#c8ff2e";text="Güçlü";}
  else{pct=100;color="#3ee8b5";text="Çok Güçlü";}
  bar.style.width=pct+"%";bar.style.background=color;
  lbl.textContent="Güç: "+text+" (~"+Math.round(bits)+" bit)";
}
$("copy").onclick=()=>{if($("pw").value){navigator.clipboard.writeText($("pw").value);ETSlib.toast("Kopyalandı ✓");}};
$("gen").onclick=gen;
gen();
</script></body></html>
