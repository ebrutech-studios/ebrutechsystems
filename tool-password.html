<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔐 Güçlü Şifre Üretici</h1>
<p class="lead" style="margin:14px 0 26px">Kırılması zor şifreler oluştur. <strong>Tamamen cihazında çalışır</strong> — hiçbir şifre dışarı gönderilmez veya kaydedilmez.</p>

<div class="tab-row">
<div class="tab-item active" id="tab1">Tek Şifre</div>
<div class="tab-item" id="tab2">Toplu Üretim (5x)</div>
</div>

<div class="controls">
<div class="field">
<label>Oluşturulan Şifre</label>
<div style="display:flex;gap:8px">
<input id="pw" class="pw-display" readonly>
<button id="copy" class="btn btn-ghost" style="white-space:nowrap;flex-shrink:0">Kopyala</button>
</div>
<div class="strength-bar"><div id="sbar" class="strength-fill"></div></div>
<div id="slabel" style="font-size:.82rem;color:var(--txt-faint);margin-bottom:8px"></div>
</div>

<div class="field">
<label>Uzunluk: <strong id="lenVal" style="color:var(--accent)">16</strong> karakter</label>
<input id="len" type="range" min="6" max="64" value="16">
</div>

<div style="border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px">
<div class="opt-row"><input id="upper" type="checkbox" checked><span>Büyük harf</span><span class="code">A-Z</span></div>
<div class="opt-row"><input id="lower" type="checkbox" checked><span>Küçük harf</span><span class="code">a-z</span></div>
<div class="opt-row"><input id="num" type="checkbox" checked><span>Rakam</span><span class="code">0-9</span></div>
<div class="opt-row"><input id="sym" type="checkbox" checked><span>Sembol</span><span class="code">!@#$%^&*</span></div>
<div class="opt-row"><input id="easy" type="checkbox"><span>Karışan karakterleri çıkar</span><span class="code">0/O, 1/l/I</span></div>
</div>

<div id="singleArea">
<button id="gen" class="btn btn-primary btn-lg" style="width:100%">🔄 Yeni Şifre Üret</button>
</div>

<div id="batchArea" style="display:none">
<button id="genBatch" class="btn btn-primary btn-lg" style="width:100%;margin-bottom:14px">🔄 5 Şifre Üret</button>
<div id="batchList"></div>
</div>

</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const $=id=>document.getElementById(id);
const len=$("len");len.oninput=()=>{$("lenVal").textContent=len.value;gen();};
["upper","lower","num","sym","easy"].forEach(id=>$(id).onchange=gen);

function buildPool(){
  let U="ABCDEFGHIJKLMNOPQRSTUVWXYZ",L="abcdefghijklmnopqrstuvwxyz",N="0123456789",S="!@#$%^&*()-_=+[]{}";
  if($("easy").checked){U=U.replace(/[OI]/g,"");L=L.replace(/[l]/g,"");N=N.replace(/[01]/g,"");}
  let pool="";if($("upper").checked)pool+=U;if($("lower").checked)pool+=L;if($("num").checked)pool+=N;if($("sym").checked)pool+=S;
  return pool;
}
function generate(n){
  const pool=buildPool();if(!pool)return"";
  const arr=new Uint32Array(n);crypto.getRandomValues(arr);
  return Array.from(arr).map(x=>pool[x%pool.length]).join("");
}
function strength(pw,poolSize){
  const bits=pw.length*Math.log2(poolSize||1);const bar=$("sbar"),lbl=$("slabel");
  let pct,color,text;
  if(bits<40){pct=25;color="#ff5555";text="Zayıf";}
  else if(bits<60){pct=50;color="#ffaa33";text="Orta";}
  else if(bits<80){pct=75;color="var(--accent)";text="Güçlü";}
  else{pct=100;color="#3ee8b5";text="Çok Güçlü";}
  bar.style.width=pct+"%";bar.style.background=color;
  lbl.textContent="Güç: "+text+" (~"+Math.round(bits)+" bit entropy)";
}
function gen(){
  const pool=buildPool();
  if(!pool){$("pw").value="";ETSlib.toast("En az bir karakter tipi seçin");return;}
  const n=parseInt(len.value);const pw=generate(n);
  $("pw").value=pw;strength(pw,pool.length);
}
$("copy").onclick=()=>{if($("pw").value){navigator.clipboard.writeText($("pw").value);ETSlib.toast("Kopyalandı ✓");}};
$("gen").onclick=gen;

// batch
function genBatch(){
  const pool=buildPool();
  if(!pool){ETSlib.toast("En az bir karakter tipi seçin");return;}
  const n=parseInt(len.value);
  const list=$("batchList");
  list.innerHTML="";
  for(let i=0;i<5;i++){
    const pw=generate(n);
    const div=document.createElement("div");div.className="batch-card";
    div.innerHTML=`<span class="batch-pw">${pw}</span><button class="batch-copy" onclick="navigator.clipboard.writeText('${pw.replace(/'/g,"\\'")}');ETSlib.toast('Kopyalandı ✓')">Kopyala</button>`;
    list.appendChild(div);
  }
  ETSlib.toast("5 şifre oluşturuldu ✓");
}
$("genBatch").onclick=genBatch;

// tabs
$("tab1").onclick=()=>{
  $("tab1").classList.add("active");$("tab2").classList.remove("active");
  $("singleArea").style.display="";$("batchArea").style.display="none";
};
$("tab2").onclick=()=>{
  $("tab2").classList.add("active");$("tab1").classList.remove("active");
  $("batchArea").style.display="";$("singleArea").style.display="none";
  if(!$("batchList").children.length)genBatch();
};

gen();
</script></body></html>
