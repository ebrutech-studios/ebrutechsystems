{"@context":"https://schema.org","@type":"WebApplication","name":"Online Resim Boyutlandırma (Yeniden Boyutlandır)","applicationCategory":"UtilitiesApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"TRY"},"url":"https://ebrutechsystems.com/tool-resizer.html"}
</script>
</head>
<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">📐 Resim Boyutlandırıcı</h1>
<p class="lead" style="margin:14px 0 26px">Görselini istediğin ölçüye getir. Piksel veya yüzde ile, oranı koruyarak yeniden boyutlandır.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla</p><input id="file" type="file" accept="image/*" class="hidden"></div>
<div id="panel" class="controls hidden">
<div class="field"><label>Hazır Boyutlar</label>
<select id="preset"><option value="">Özel</option>
<option value="1080x1080">Instagram Kare (1080×1080)</option>
<option value="1080x1920">Story/Reels (1080×1920)</option>
<option value="1200x630">Sosyal Kapak (1200×630)</option>
<option value="1920x1080">Full HD (1920×1080)</option>
<option value="800x800">Ürün Foto (800×800)</option>
<option value="pct50">%50 Küçült</option><option value="pct25">%25 Küçült</option></select></div>
<div class="row"><div class="field"><label>Genişlik (px)</label><input id="w" type="number"></div>
<div class="field"><label>Yükseklik (px)</label><input id="h" type="number"></div></div>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--txt-dim);font-size:.9rem"><input id="lock" type="checkbox" checked style="width:auto"> Oranı koru</label>
<div class="field"><label>Çıktı Formatı</label><select id="fmt"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option><option value="image/webp">WebP</option></select></div>
<button id="go" class="btn btn-primary">Boyutlandır & İndir</button>
<p id="info" style="color:var(--txt-faint);font-size:.86rem"></p></div>
<div id="preview" class="preview hidden"><img id="img" alt="Boyutlandırılacak görsel önizlemesi"></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,ratio=1,origName="resim";
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),w=$("w"),h=$("h"),lock=$("lock");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
function load(f){origName=(f.name||"resim").replace(/\.[^.]+$/,"");const r=new FileReader();r.onload=ev=>{imgEl=new Image();imgEl.onload=()=>{
$("img").src=imgEl.src;$("preview").classList.remove("hidden");$("panel").classList.remove("hidden");
ratio=imgEl.naturalWidth/imgEl.naturalHeight;w.value=imgEl.naturalWidth;h.value=imgEl.naturalHeight;
$("info").textContent="Orijinal: "+imgEl.naturalWidth+" × "+imgEl.naturalHeight+" px";
};imgEl.src=ev.target.result;};r.readAsDataURL(f);}
w.oninput=()=>{if(lock.checked&&imgEl)h.value=Math.round(w.value/ratio);$("preset").value="";};
h.oninput=()=>{if(lock.checked&&imgEl)w.value=Math.round(h.value*ratio);$("preset").value="";};
$("preset").onchange=()=>{const v=$("preset").value;if(!v||!imgEl)return;
if(v.startsWith("pct")){const p=parseInt(v.slice(3))/100;w.value=Math.round(imgEl.naturalWidth*p);h.value=Math.round(imgEl.naturalHeight*p);}
else{const[pw,ph]=v.split("x").map(Number);w.value=pw;h.value=ph;}};
$("go").onclick=()=>{if(!imgEl)return;const c=document.createElement("canvas");
c.width=parseInt(w.value)||imgEl.naturalWidth;c.height=parseInt(h.value)||imgEl.naturalHeight;
const ctx=c.getContext("2d");const fmt=$("fmt").value;
if(fmt==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);}
ctx.imageSmoothingQuality="high";ctx.drawImage(imgEl,0,0,c.width,c.height);
c.toBlob(b=>{const ext=fmt.split("/")[1].replace("jpeg","jpg");
const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=origName+"-"+c.width+"x"+c.height+"."+ext;a.click();
ETSlib.toast("Boyutlandırıldı ✓");},fmt,0.92);};
</script></body></html>
