<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">📐 Resim Boyutlandırıcı</h1>
<p class="lead" style="margin:14px 0 26px">Görseli istediğin ölçüye getir. Piksel, yüzde veya sosyal medya presetleri ile boyutlandır.</p>

<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla</p><input id="file" type="file" accept="image/*" class="hidden"></div>

<div id="panel" class="controls hidden">

<div style="font-size:.82rem;font-weight:600;color:var(--txt-dim);margin-bottom:10px">Hazır Boyutlar</div>
<div class="preset-grid">
<button class="preset-card" data-w="1080" data-h="1080">📷 Instagram Kare<span class="dim">1080 × 1080</span></button>
<button class="preset-card" data-w="1080" data-h="1920">📱 Story / Reels<span class="dim">1080 × 1920</span></button>
<button class="preset-card" data-w="1200" data-h="630">🌐 Facebook / OG<span class="dim">1200 × 630</span></button>
<button class="preset-card" data-w="1280" data-h="720">▶️ YouTube Kapak<span class="dim">1280 × 720</span></button>
<button class="preset-card" data-w="1920" data-h="1080">🖥 Full HD<span class="dim">1920 × 1080</span></button>
<button class="preset-card" data-w="800" data-h="800">🛒 Ürün Foto<span class="dim">800 × 800</span></button>
<button class="preset-card" data-pct="75">🔽 %75 Küçült<span class="dim">Orana göre</span></button>
<button class="preset-card" data-pct="50">🔽 %50 Küçült<span class="dim">Orana göre</span></button>
<button class="preset-card" data-pct="25">🔽 %25 Küçült<span class="dim">Orana göre</span></button>
</div>

<div class="row">
<div class="field"><label>Genişlik (px)</label><input id="w" type="number" min="1"></div>
<div class="field"><label>Yükseklik (px)</label><input id="h" type="number" min="1"></div>
</div>

<label class="lock-toggle locked" id="lockLabel">
<input id="lock" type="checkbox" checked>
<span id="lockIcon">🔒</span>
<span id="lockText">Oranı koru (kilitli)</span>
</label>

<div class="row">
<div class="field"><label>Çıktı Formatı</label><select id="fmt"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option><option value="image/webp">WebP</option></select></div>
<div class="field"><label>Kalite (%)</label><input id="q" type="number" value="92" min="10" max="100"></div>
</div>

<div class="result-info" id="resultInfo" style="display:none">
<div class="rinfo-card">
<div class="lbl">Orijinal</div>

</div>
<div class="rinfo-card accent">
<div class="lbl">Yeni Boyut</div>
<div class="val" id="newDim"></div>
</div>
</div>

<button id="go" class="btn btn-primary btn-lg" style="width:100%">Boyutlandır & İndir</button>
</div>

<div id="preview" class="preview hidden" style="margin-top:16px"><img id="img" alt="Boyutlandırılacak görsel" style="border-radius:12px;max-height:260px;object-fit:contain"></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,ratio=1,origName="resim",origW=0,origH=0;
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),wInp=$("w"),hInp=$("h"),lock=$("lock");

dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};

function load(f){
  origName=(f.name||"resim").replace(/\.[^.]+$/,"");
  const r=new FileReader();
  r.onload=ev=>{
    imgEl=new Image();
    imgEl.onload=()=>{
      origW=imgEl.naturalWidth;origH=imgEl.naturalHeight;
      ratio=origW/origH;
      $("img").src=imgEl.src;
      $("preview").classList.remove("hidden");
      $("panel").classList.remove("hidden");
      wInp.value=origW;hInp.value=origH;
      updateResultInfo();
    };
    imgEl.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

lock.onchange=()=>{
  const locked=lock.checked;
  $("lockLabel").classList.toggle("locked",locked);
  $("lockIcon").textContent=locked?"🔒":"🔓";
  $("lockText").textContent=locked?"Oranı koru (kilitli)":"Oranı koru (serbest)";
};

wInp.oninput=()=>{if(lock.checked&&imgEl)hInp.value=Math.round(wInp.value/ratio);clearPresets();updateResultInfo();};
hInp.oninput=()=>{if(lock.checked&&imgEl)wInp.value=Math.round(hInp.value*ratio);clearPresets();updateResultInfo();};

function clearPresets(){document.querySelectorAll(".preset-card").forEach(c=>c.classList.remove("active"));}

document.querySelectorAll(".preset-card").forEach(btn=>{
  btn.onclick=()=>{
    if(!imgEl)return;
    clearPresets();btn.classList.add("active");
    if(btn.dataset.pct){
      const p=parseInt(btn.dataset.pct)/100;
      wInp.value=Math.round(origW*p);hInp.value=Math.round(origH*p);
    }else{wInp.value=btn.dataset.w;hInp.value=btn.dataset.h;}
    updateResultInfo();
  };
});

function updateResultInfo(){
  if(!imgEl)return;
  const nw=parseInt(wInp.value)||origW;const nh=parseInt(hInp.value)||origH;
  $("origDim").textContent=origW+" × "+origH+" px";
  $("newDim").textContent=nw+" × "+nh+" px";
  $("resultInfo").style.display="grid";
}

$("go").onclick=()=>{
  if(!imgEl)return;
  const nw=parseInt(wInp.value)||origW;const nh=parseInt(hInp.value)||origH;
  const c=document.createElement("canvas");c.width=nw;c.height=nh;
  const ctx=c.getContext("2d");const fmt=$("fmt").value;const qq=parseFloat($("q").value)/100;
  if(fmt==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,nw,nh);}
  ctx.imageSmoothingQuality="high";ctx.drawImage(imgEl,0,0,nw,nh);
  c.toBlob(b=>{
    const ext=fmt.split("/")[1].replace("jpeg","jpg");
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download=origName+"-"+nw+"x"+nh+"."+ext;a.click();
    ETSlib.toast("İndirildi ✓ "+nw+"×"+nh+" px");
  },fmt,qq);
};
</script></body></html>
