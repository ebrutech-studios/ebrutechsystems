</head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">📏 Resim Boyutlandırıcı</h1>
<p class="lead" style="margin:14px 0 26px">Görseli istediğin piksel ölçülerine getir. Oran kilidi ile bozulma olmaz.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla</p><input id="file" type="file" accept="image/*" class="hidden"></div>
<div id="panel" class="controls hidden">
<div class="row"><div class="field"><label>Genişlik (px)</label><input id="w" type="number"></div>
<div class="field"><label>Yükseklik (px)</label><input id="h" type="number"></div></div>
<label style="display:flex;gap:8px;align-items:center;color:var(--txt-dim);font-size:.9rem"><input id="lock" type="checkbox" checked style="width:auto"> Oranı koru</label>
<button id="go" class="btn btn-primary">Boyutlandır & İndir</button></div>
<div id="preview" class="preview hidden"><img id="img"></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,ratio=1;
const dz=document.getElementById("dz"),file=document.getElementById("file"),w=document.getElementById("w"),h=document.getElementById("h"),lock=document.getElementById("lock");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
function load(f){const r=new FileReader();r.onload=ev=>{imgEl=new Image();imgEl.onload=()=>{
ratio=imgEl.naturalWidth/imgEl.naturalHeight;w.value=imgEl.naturalWidth;h.value=imgEl.naturalHeight;
document.getElementById("img").src=imgEl.src;document.getElementById("preview").classList.remove("hidden");
document.getElementById("panel").classList.remove("hidden");};imgEl.src=ev.target.result;};r.readAsDataURL(f);}
w.oninput=()=>{if(lock.checked)h.value=Math.round(w.value/ratio);};
h.oninput=()=>{if(lock.checked)w.value=Math.round(h.value*ratio);};
document.getElementById("go").onclick=()=>{if(!imgEl)return;
const c=document.createElement("canvas");c.width=+w.value;c.height=+h.value;
c.getContext("2d").drawImage(imgEl,0,0,c.width,c.height);
c.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ebrutech-resized.png";a.click();ETSlib.toast("İndiriliyor ✓");},"image/png");};
</script></body></html>
