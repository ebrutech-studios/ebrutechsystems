</head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Pro Araç</span><h1 style="font-size:2.2rem">📑 PDF Sayfa Düzenleyici</h1>
<p class="lead" style="margin:14px 0 26px">PDF sayfalarını sırala, sil, yeni PDF olarak indir. Tarayıcıda çalışır.</p>
<div id="gate" class="card hidden" style="text-align:center;padding:40px">
<div style="font-size:2.4rem;margin-bottom:10px">🔒</div><h3 id="gateTitle">Yükleniyor...</h3>
<p id="gateDesc" style="color:var(--txt-dim);margin:8px 0 20px"></p>
<div id="gateBtns" class="row" style="max-width:380px;margin:0 auto"></div></div>
<div id="tool" class="hidden">
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>PDF seç</b> veya sürükle</p><input id="file" type="file" accept="application/pdf" class="hidden"></div>
<ul id="list" class="controls" style="list-style:none;padding:0"></ul>
<button id="go" class="btn btn-primary hidden">Yeni PDF Oluştur & İndir</button>
<p id="info" style="color:var(--txt-faint);font-size:.86rem;margin-top:10px"></p>
</div></div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
function applyGate(user,isPro){
  const gate=document.getElementById("gate"),tool=document.getElementById("tool");
  const t=document.getElementById("gateTitle"),d=document.getElementById("gateDesc"),b=document.getElementById("gateBtns");
  if(isPro){gate.classList.add("hidden");tool.classList.remove("hidden");return;}
  gate.classList.remove("hidden");tool.classList.add("hidden");
  if(!user){t.textContent="Giriş yapman gerekiyor";d.textContent="Bu araç Pro üyelere özel. Önce giriş yap.";
    b.innerHTML='<a href="giris.html" class="btn btn-primary">Giriş Yap</a><a href="fiyatlandirma.html" class="btn btn-ghost">Pro Nedir?</a>';}
  else{t.textContent="Bu araç Pro üyelere özel";d.textContent="Hesabın var ama Pro değil. Pro\u0027ya geçmek için WhatsApp\u0027tan ulaş.";
    b.innerHTML='<a href="fiyatlandirma.html" class="btn btn-primary">Pro\u0027ya Geç</a>';}
}
document.addEventListener("ets-auth",(e)=>applyGate(e.detail.user,e.detail.isPro));

let srcBytes=null,order=[];
const dz=document.getElementById("dz"),file=document.getElementById("file"),list=document.getElementById("list"),go=document.getElementById("go");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
async function load(f){
  try{
    srcBytes=new Uint8Array(await f.arrayBuffer());
    const {PDFDocument}=PDFLib;const pdf=await PDFDocument.load(srcBytes,{ignoreEncryption:true});
    order=pdf.getPageIndices();render();
  }catch(e){console.error(e);ETSlib.toast("PDF okunamadı");}
}
function render(){
  list.innerHTML="";
  order.forEach((pgIdx,pos)=>{const li=document.createElement("li");li.className="card";li.style.cssText="display:flex;align-items:center;gap:12px;padding:10px 14px";
    li.innerHTML=`<span style="font-size:1.2rem">📄</span><span style="flex:1;font-size:.88rem">Orijinal sayfa ${pgIdx+1}</span>
      <button data-up="${pos}" class="btn btn-ghost" style="padding:6px 10px">↑</button>
      <button data-dn="${pos}" class="btn btn-ghost" style="padding:6px 10px">↓</button>
      <button data-rm="${pos}" class="btn btn-ghost" style="padding:6px 10px">🗑</button>`;list.appendChild(li);});
  go.classList.toggle("hidden",order.length<1);
  document.getElementById("info").textContent=order.length+" sayfa kalacak";
  list.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{const i=+b.dataset.up;if(i>0){[order[i-1],order[i]]=[order[i],order[i-1]];render();}});
  list.querySelectorAll("[data-dn]").forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;if(i<order.length-1){[order[i+1],order[i]]=[order[i],order[i+1]];render();}});
  list.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{order.splice(+b.dataset.rm,1);render();});
}
go.onclick=async()=>{
  if(!order.length)return;
  try{
    go.textContent="Oluşturuluyor...";go.disabled=true;
    const {PDFDocument}=PDFLib;const src=await PDFDocument.load(srcBytes,{ignoreEncryption:true});
    const out=await PDFDocument.create();const copied=await out.copyPages(src,order);copied.forEach(p=>out.addPage(p));
    const bytes=await out.save();const blob=new Blob([bytes],{type:"application/pdf"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ebrutech-duzenlenmis.pdf";a.click();
    ETSlib.toast("PDF indiriliyor ✓");
  }catch(e){console.error(e);ETSlib.toast("Hata oluştu");}
  finally{go.textContent="Yeni PDF Oluştur & İndir";go.disabled=false;}
};
</script></body></html>
