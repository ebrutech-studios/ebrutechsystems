<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç · Geliştirici</span><h1 style="font-size:2.2rem">{ } JSON Formatlayıcı</h1>
<p class="lead" style="margin:14px 0 26px">JSON'u biçimlendir, küçült, doğrula ve analiz et. Anahtar sayısı, derinlik ve boyut bilgileri.</p>
<div class="controls">

<div class="field">
<label>JSON Girişi</label>
<textarea id="in" class="ta" placeholder='{"ad":"EbruTech","yil":2026,"ozellikler":["hızlı","güvenli","ücretsiz"]}'></textarea>
<div class="status-bar empty" id="status">JSON girin ve otomatik doğrulanır...</div>
</div>

<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
<div>
  <div style="font-size:.78rem;color:var(--txt-faint);margin-bottom:6px">Girintileme</div>
  <div class="indent-sel">
    <button class="indent-btn active" data-i="2">2 boşluk</button>
    <button class="indent-btn" data-i="4">4 boşluk</button>
    <button class="indent-btn" data-i="tab">Tab</button>
  </div>
</div>
<div class="row" style="margin:0">
<button id="format" class="btn btn-primary">Biçimlendir</button>
<button id="minify" class="btn btn-ghost">Küçült</button>
<button id="copy" class="btn btn-ghost">Kopyala</button>
<button id="clear" class="btn btn-ghost">Temizle</button>
</div>
</div>

<div id="statsArea" class="stat-chips" style="display:none"></div>

<div class="field">
<label>Çıktı</label>
<textarea id="out" class="ta" readonly style="min-height:200px"></textarea>
</div>
</div>

<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const inp=document.getElementById("in"),out=document.getElementById("out"),status=document.getElementById("status"),statsArea=document.getElementById("statsArea");
let indent=2;

document.querySelectorAll(".indent-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".indent-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    indent=b.dataset.i==="tab"?"\t":parseInt(b.dataset.i);
    if(out.value)tryFormat();
  };
});

function setStatus(ok,msg){
  status.className="status-bar "+(ok===null?"empty":ok?"ok":"err");
  status.textContent=(ok===true?"✓ ":ok===false?"✕ ":"")+msg;
}

function countKeys(obj,depth=0){
  if(typeof obj!=="object"||obj===null)return{keys:0,depth};
  const arr=Array.isArray(obj);let total=0,maxD=depth;
  for(const v of(arr?obj:Object.values(obj))){
    if(!arr)total++;
    const r=countKeys(v,depth+1);total+=r.keys;if(r.depth>maxD)maxD=r.depth;
  }
  return{keys:total,depth:maxD};
}

function showStats(obj,rawJson){
  const {keys,depth}=countKeys(obj);
  const arrays=JSON.stringify(obj).match(/\[/g)||[];
  const bytes=new Blob([rawJson]).size;
  const fmt_bytes=bytes<1024?bytes+" B":bytes<1048576?(bytes/1024).toFixed(1)+" KB":(bytes/1048576).toFixed(2)+" MB";
  statsArea.style.display="flex";
  statsArea.innerHTML=
    `<div class="stat-chip"><b>${keys}</b> anahtar</div>`+
    `<div class="stat-chip">Derinlik <b>${depth}</b></div>`+
    `<div class="stat-chip"><b>${arrays.length}</b> dizi</div>`+
    `<div class="stat-chip">Ham boyut <b>${fmt_bytes}</b></div>`+
    `<div class="stat-chip">Tip: <b>${Array.isArray(obj)?"Array":"Object"}</b></div>`;
}

function tryFormat(){
  const v=inp.value.trim();
  try{const o=JSON.parse(v);out.value=JSON.stringify(o,null,indent);setStatus(true,"Geçerli JSON");showStats(o,v);}
  catch(e){setStatus(false,e.message);statsArea.style.display="none";}
}

inp.oninput=tryFormat;

document.getElementById("format").onclick=()=>{
  const v=inp.value.trim();if(!v){setStatus(null,"Önce JSON girin");return;}
  try{const o=JSON.parse(v);out.value=JSON.stringify(o,null,indent);setStatus(true,"Biçimlendirildi ✓");showStats(o,v);ETSlib.toast("Biçimlendirildi ✓");}
  catch(e){setStatus(false,e.message);}
};
document.getElementById("minify").onclick=()=>{
  const v=inp.value.trim();if(!v)return;
  try{const o=JSON.parse(v);out.value=JSON.stringify(o);setStatus(true,"Küçültüldü ✓");ETSlib.toast("Küçültüldü ✓");}
  catch(e){setStatus(false,e.message);}
};
document.getElementById("copy").onclick=()=>{
  const src=out.value||inp.value;if(!src)return;
  navigator.clipboard.writeText(src);ETSlib.toast("Kopyalandı ✓");
};
document.getElementById("clear").onclick=()=>{inp.value="";out.value="";setStatus(null,"JSON girin ve otomatik doğrulanır...");statsArea.style.display="none";};
</script></body></html>
