<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç · Geliştirici</span><h1 style="font-size:2.2rem">{ } JSON Formatlayıcı</h1>
<p class="lead" style="margin:14px 0 26px">JSON'u düzgün biçimlendir, küçült veya hataları bul. Tarayıcıda çalışır.</p>
<div class="controls">
<div class="field"><label>JSON Girişi</label><textarea id="in" class="ta" placeholder='{"ad":"EbruTech","yil":2026}'></textarea></div>
<div class="row"><button id="format" class="btn btn-primary">Biçimlendir</button><button id="minify" class="btn btn-ghost">Küçült</button><button id="copy" class="btn btn-ghost">Kopyala</button></div>
<div id="err" style="display:none;padding:10px 12px;border-radius:10px;background:rgba(255,80,80,.12);color:#ff8080;font-size:.86rem"></div>
<div class="field"><label>Çıktı</label><textarea id="out" class="ta" readonly></textarea></div>
</div></div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const inp=document.getElementById("in"),out=document.getElementById("out"),err=document.getElementById("err");
function showErr(m){err.style.display=m?"block":"none";err.textContent=m||"";}
function parse(){const v=inp.value.trim();if(!v){showErr("Önce JSON gir.");return null;}
  try{const o=JSON.parse(v);showErr("");return o;}catch(e){showErr("Geçersiz JSON: "+e.message);return null;}}
document.getElementById("format").onclick=()=>{const o=parse();if(o!==null){out.value=JSON.stringify(o,null,2);ETSlib.toast("Biçimlendirildi ✓");}};
document.getElementById("minify").onclick=()=>{const o=parse();if(o!==null){out.value=JSON.stringify(o);ETSlib.toast("Küçültüldü ✓");}};
document.getElementById("copy").onclick=()=>{if(!out.value)return;navigator.clipboard.writeText(out.value);ETSlib.toast("Kopyalandı ✓");};
</script></body></html>
