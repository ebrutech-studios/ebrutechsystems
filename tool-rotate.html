</head><body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔄 Döndürme & Çevirme</h1>
<p class="lead" style="margin:14px 0 26px">Görseli döndür, yatay/dikey çevir. Tarayıcıda çalışır.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli seç</b> veya sürükle</p><input id="file" type="file" accept="image/*" class="hidden"></div>
<div id="panel" class="controls hidden">
<div class="row"><button class="btn btn-ghost" id="rl">↺ Sola 90°</button><button class="btn btn-ghost" id="rr">↻ Sağa 90°</button></div>
<div class="row"><button class="btn btn-ghost" id="fh">↔ Yatay Çevir</button><button class="btn btn-ghost" id="fv">↕ Dikey Çevir</button></div>
<button id="go" class="btn btn-primary">İndir</button></div>
<div id="preview" class="preview hidden"><canvas id="cv" style="max-width:100%;border-radius:10px"></canvas></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,rot=0,fx=1,fy=1,cv=document.getElementById("cv");
const dz=document.getElementById("dz"),file=document.getElementById("file");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
function load(f){const r=new FileReader();r.onload=ev=>{imgEl=new Image();imgEl.onload=()=>{rot=0;fx=1;fy=1;
document.getElementById("preview").classList.remove("hidden");document.getElementById("panel").classList.remove("hidden");draw();};imgEl.src=ev.target.result;};r.readAsDataURL(f);}
document.getElementById("rl").onclick=()=>{rot=(rot+270)%360;draw();};
document.getElementById("rr").onclick=()=>{rot=(rot+90)%360;draw();};
document.getElementById("fh").onclick=()=>{fx*=-1;draw();};
document.getElementById("fv").onclick=()=>{fy*=-1;draw();};
function draw(){if(!imgEl)return;const w=imgEl.naturalWidth,h=imgEl.naturalHeight;
const swap=(rot===90||rot===270);cv.width=swap?h:w;cv.height=swap?w:h;
const ctx=cv.getContext("2d");ctx.save();ctx.translate(cv.width/2,cv.height/2);ctx.rotate(rot*Math.PI/180);ctx.scale(fx,fy);
ctx.drawImage(imgEl,-w/2,-h/2);ctx.restore();}
document.getElementById("go").onclick=()=>{cv.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ebrutech-dondurulmus.png";a.click();ETSlib.toast("İndiriliyor ✓");},"image/png");};
</script></body></html>
