<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔄 Resim Döndür & Çevir</h1>
<p class="lead" style="margin:14px 0 26px">Görselini hızla döndür, aynala veya serbest açıyla eğ. Anlık önizleme ile tam kontrol.</p>

<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla<br><span style="color:var(--txt-faint);font-size:.85rem">PNG · JPG · WebP</span></p><input id="file" type="file" accept="image/*" class="hidden"></div>

<div id="panel" class="controls hidden">

<div style="font-size:.82rem;font-weight:600;color:var(--txt-dim);margin-bottom:8px">Hızlı Döndürme</div>
<div class="action-grid">
  <button class="action-btn" id="rl90">↺ Sola 90°</button>
  <button class="action-btn" id="rr90">↻ Sağa 90°</button>
  <button class="action-btn" id="r180">⟳ 180°</button>
  <button class="action-btn" id="reset">✕ Sıfırla</button>
</div>

<div style="font-size:.82rem;font-weight:600;color:var(--txt-dim);margin-bottom:8px">Yansıtma</div>
<div class="flip-row">
  <button class="flip-btn" id="fh">↔ Yatay Çevir</button>
  <button class="flip-btn" id="fv">↕ Dikey Çevir</button>
</div>

<div class="field">
  <label>İnce Ayar Açısı: <strong id="aVal">0</strong>°</label>
  <input id="angle" type="range" min="-45" max="45" value="0">
</div>

<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
  <div class="angle-badge" id="angleBadge">⟳ Toplam: 0°</div>
  <div style="font-size:.8rem;color:var(--txt-faint)">Çeviri: <span id="flipStatus">Yok</span></div>
</div>

<div class="row">
  <div class="field"><label>Çıktı Formatı</label><select id="fmt"><option value="image/png">PNG (önerilen)</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select></div>
  <div class="field" id="bgWrap"><label>Arka Plan</label><input id="bg" type="color" value="#ffffff" style="height:42px;padding:4px"></div>
</div>

<div class="dim-cards" id="dimCards" style="display:none">
  <div class="dim-card"><div class="lbl">Orijinal</div><div class="val" id="origDim"></div></div>
  <div class="dim-card accent"><div class="lbl">Çıktı Boyutu</div><div class="val" id="outDim"></div></div>
</div>

<button id="go" class="btn btn-primary btn-lg" style="width:100%;margin-top:14px">İndir</button>
</div>

<div id="preview" class="hidden">
  <div class="cv-wrap"><canvas id="cv"></canvas></div>
</div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,rot=0,flipH=1,flipV=1,fine=0,origName="resim";
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),cv=$("cv");

dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};

function load(f){
  origName=(f.name||"resim").replace(/\.[^.]+$/,"");
  const r=new FileReader();
  r.onload=ev=>{
    imgEl=new Image();
    imgEl.onload=()=>{
      $("preview").classList.remove("hidden");
      $("panel").classList.remove("hidden");
      rot=0;flipH=1;flipV=1;fine=0;
      $("angle").value=0;$("aVal").textContent="0";
      $("origDim").textContent=imgEl.naturalWidth+" × "+imgEl.naturalHeight+" px";
      $("dimCards").style.display="grid";
      draw();
    };
    imgEl.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

function draw(){
  if(!imgEl)return;
  const totalDeg=(rot+fine);
  const rad=totalDeg*Math.PI/180;
  const w=imgEl.naturalWidth,h=imgEl.naturalHeight;
  const sin=Math.abs(Math.sin(rad)),cos=Math.abs(Math.cos(rad));
  const ow=Math.round(w*cos+h*sin),oh=Math.round(w*sin+h*cos);
  cv.width=ow;cv.height=oh;
  const ctx=cv.getContext("2d");

  const fmt=$("fmt").value;
  if(fmt==="image/jpeg"||fine!==0){ctx.fillStyle=$("bg").value;ctx.fillRect(0,0,ow,oh);}

  ctx.save();
  ctx.translate(ow/2,oh/2);
  ctx.rotate(rad);
  ctx.scale(flipH,flipV);
  ctx.drawImage(imgEl,-w/2,-h/2);
  ctx.restore();
  cv.style.maxWidth="100%";cv.style.height="auto";

  $("outDim").textContent=ow+" × "+oh+" px";
  $("angleBadge").textContent="⟳ Toplam: "+totalDeg+"°";
  const flips=[];if(flipH===-1)flips.push("Yatay");if(flipV===-1)flips.push("Dikey");
  $("flipStatus").textContent=flips.length?flips.join(" + "):"Yok";
}

$("rl90").onclick=()=>{rot=(rot-90+360)%360;draw();};
$("rr90").onclick=()=>{rot=(rot+90)%360;draw();};
$("r180").onclick=()=>{rot=(rot+180)%360;draw();};
$("fh").onclick=()=>{flipH*=-1;draw();};
$("fv").onclick=()=>{flipV*=-1;draw();};
$("reset").onclick=()=>{rot=0;flipH=1;flipV=1;fine=0;$("angle").value=0;$("aVal").textContent="0";draw();};
$("angle").oninput=()=>{fine=parseInt($("angle").value);$("aVal").textContent=fine;draw();};
$("fmt").onchange=()=>{$("bgWrap").style.display=$("fmt").value==="image/png"?"none":"block";draw();};
$("bg").onchange=draw;

$("go").onclick=()=>{
  if(!imgEl)return;
  const fmt=$("fmt").value;
  const doDownload=b=>{
    const ext=fmt.split("/")[1].replace("jpeg","jpg");
    const a=document.createElement("a");a.href=URL.createObjectURL(b);
    a.download=origName+"-dondurulmus."+ext;a.click();
    ETSlib.toast("İndirildi ✓ "+cv.width+"×"+cv.height+" px");
  };
  if(fmt==="image/jpeg"){
    const t=document.createElement("canvas");t.width=cv.width;t.height=cv.height;
    const tx=t.getContext("2d");tx.fillStyle=$("bg").value;tx.fillRect(0,0,t.width,t.height);tx.drawImage(cv,0,0);
    t.toBlob(doDownload,fmt,0.92);
  } else cv.toBlob(doDownload,fmt);
};
</script></body></html>
