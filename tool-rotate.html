<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔄 Resim Döndür & Çevir</h1>
<p class="lead" style="margin:14px 0 26px">Görselini döndür, aynala veya serbest açıyla eğ. Hızlı ve kayıpsız.</p>
<div class="dropzone" id="dz"><div class="ico">📥</div><p><b>Görseli buraya sürükle</b> veya tıkla</p><input id="file" type="file" accept="image/*" class="hidden"></div>
<div id="panel" class="controls hidden">
<div class="row">
<button class="btn btn-ghost" id="rl">↺ Sola 90°</button>
<button class="btn btn-ghost" id="rr">↻ Sağa 90°</button>
<button class="btn btn-ghost" id="fh">↔ Yatay Çevir</button>
<button class="btn btn-ghost" id="fv">↕ Dikey Çevir</button></div>
<div class="field"><label>İnce ayar açısı: <span id="aVal">0</span>°</label><input id="angle" type="range" min="-45" max="45" value="0"></div>
<div class="field"><label>Çıktı Formatı</label><select id="fmt"><option value="image/png">PNG (önerilen)</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select></div>
<button id="go" class="btn btn-primary">İndir</button>
<button id="reset" class="btn btn-ghost">Sıfırla</button></div>
<div id="preview" class="preview hidden"><canvas id="cv"></canvas></div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let imgEl=null,rot=0,flipH=1,flipV=1,fine=0,origName="resim";
const $=id=>document.getElementById(id);
const dz=$("dz"),file=$("file"),cv=$("cv");
dz.onclick=()=>file.click();
dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};dz.ondragleave=()=>dz.classList.remove("drag");
dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
file.onchange=e=>{if(e.target.files[0])load(e.target.files[0]);};
function load(f){origName=(f.name||"resim").replace(/\.[^.]+$/,"");const r=new FileReader();r.onload=ev=>{imgEl=new Image();imgEl.onload=()=>{
$("preview").classList.remove("hidden");$("panel").classList.remove("hidden");rot=0;flipH=1;flipV=1;fine=0;$("angle").value=0;$("aVal").textContent="0";draw();
};imgEl.src=ev.target.result;};r.readAsDataURL(f);}
function draw(){if(!imgEl)return;const rad=(rot+fine)*Math.PI/180;
const w=imgEl.naturalWidth,h=imgEl.naturalHeight;
const sin=Math.abs(Math.sin(rad)),cos=Math.abs(Math.cos(rad));
cv.width=w*cos+h*sin;cv.height=w*sin+h*cos;
const ctx=cv.getContext("2d");ctx.clearRect(0,0,cv.width,cv.height);
ctx.save();ctx.translate(cv.width/2,cv.height/2);ctx.rotate(rad);ctx.scale(flipH,flipV);
ctx.drawImage(imgEl,-w/2,-h/2);ctx.restore();
cv.style.maxWidth="100%";cv.style.height="auto";}
$("rl").onclick=()=>{rot=(rot-90)%360;draw();};
$("rr").onclick=()=>{rot=(rot+90)%360;draw();};
$("fh").onclick=()=>{flipH*=-1;draw();};
$("fv").onclick=()=>{flipV*=-1;draw();};
$("angle").oninput=()=>{fine=parseInt($("angle").value);$("aVal").textContent=fine;draw();};
$("reset").onclick=()=>{rot=0;flipH=1;flipV=1;fine=0;$("angle").value=0;$("aVal").textContent="0";draw();};
$("go").onclick=()=>{if(!imgEl)return;const fmt=$("fmt").value;
if(fmt==="image/jpeg"){const t=document.createElement("canvas");t.width=cv.width;t.height=cv.height;
const tx=t.getContext("2d");tx.fillStyle="#fff";tx.fillRect(0,0,t.width,t.height);tx.drawImage(cv,0,0);
t.toBlob(dl,fmt,0.92);}else cv.toBlob(dl,fmt);
function dl(b){const ext=fmt.split("/")[1].replace("jpeg","jpg");
const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=origName+"-dondurulmus."+ext;a.click();ETSlib.toast("İndirildi ✓");}};
</script></body></html>
