<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">Unix Timestamp Dönüştürücü</h1>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" id="tsNowCopy">Kopyala</button>
      <button class="btn btn-ghost" id="tsNowMs">Milisaniye</button>

  </div>

  <!-- Timestamp → Tarih -->
  <div class="ts-card">
    <h3>Timestamp → Tarih / Saat</h3>
    <div class="ts-input-row">
      <input class="ts-input" id="ts2dInput" type="number" placeholder="1718812800" inputmode="numeric">
      <button class="btn btn-primary" id="ts2dBtn">Çevir</button>
      <button class="btn btn-ghost" id="ts2dNowBtn">Şimdi</button>
    </div>
    <div class="ts-err" id="ts2dErr"></div>
    <div class="ts-result-grid" id="ts2dResult" style="display:none">
      <span class="ts-rk">Yerel Saat</span><span class="ts-rv" id="ts2dLocal"></span><button class="ts-copy-sm" data-copy="ts2dLocal">Kopyala</button>
      <span class="ts-rk">UTC</span><span class="ts-rv" id="ts2dUtc"></span><button class="ts-copy-sm" data-copy="ts2dUtc">Kopyala</button>

      <span class="ts-rk">Göreli</span><span class="ts-rv" id="ts2dRel"></span><button class="ts-copy-sm" data-copy="ts2dRel">Kopyala</button>
    </div>
  </div>

  <!-- Tarih → Timestamp -->
  <div class="ts-card">
    <h3>Tarih / Saat → Timestamp</h3>
    <div class="ts-input-row">
      <input class="ts-input" id="d2tsInput" type="datetime-local">
      <button class="btn btn-primary" id="d2tsBtn">Çevir</button>
    </div>
    <div class="ts-err" id="d2tsErr"></div>
    <div class="ts-result-grid" id="d2tsResult" style="display:none">
      <span class="ts-rk">Unix (sn)</span><span class="ts-rv" id="d2tsSec"></span><button class="ts-copy-sm" data-copy="d2tsSec">Kopyala</button>

      <span class="ts-rk">ISO 8601</span><span class="ts-rv" id="d2tsIso"></span><button class="ts-copy-sm" data-copy="d2tsIso">Kopyala</button>
    </div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
function pad(n){return String(n).padStart(2,"0");}
function fmtLocal(d){return d.toLocaleDateString("tr-TR",{year:"numeric",month:"2-digit",day:"2-digit"})+" "+d.toLocaleTimeString("tr-TR");}
function fmtUtc(d){return d.getUTCFullYear()+"-"+pad(d.getUTCMonth()+1)+"-"+pad(d.getUTCDate())+" "+pad(d.getUTCHours())+":"+pad(d.getUTCMinutes())+":"+pad(d.getUTCSeconds())+" UTC";}
function fmtRel(d){
  const diff=Date.now()-d.getTime();
  const abs=Math.abs(diff);
  const suf=diff>0?"önce":"sonra";
  if(abs<60000) return Math.round(abs/1000)+" saniye "+suf;
  if(abs<3600000) return Math.round(abs/60000)+" dakika "+suf;
  if(abs<86400000) return Math.round(abs/3600000)+" saat "+suf;
  if(abs<2592000000) return Math.round(abs/86400000)+" gün "+suf;
  return Math.round(abs/2592000000)+" ay "+suf;
}

/* Şu anki timestamp */
function tickNow(){
  const s=Math.floor(Date.now()/1000);
  document.getElementById("tsNow").textContent=s;
}
tickNow();setInterval(tickNow,1000);
let showMs=false;
document.getElementById("tsNowMs").addEventListener("click",function(){
  showMs=!showMs;
  this.textContent=showMs?"Saniye":"Milisaniye";
  setInterval(()=>{
    document.getElementById("tsNow").textContent=showMs?Date.now():Math.floor(Date.now()/1000);
  },showMs?10:1000);
});
document.getElementById("tsNowCopy").addEventListener("click",async()=>{
  const t=document.getElementById("tsNow").textContent;
  await navigator.clipboard.writeText(t);
  const b=document.getElementById("tsNowCopy");b.textContent="Kopyalandı";setTimeout(()=>b.textContent="Kopyala",1800);
});

/* Timestamp → Tarih */
function conv_ts2d(val){
  let n=parseFloat(val);
  if(isNaN(n)){document.getElementById("ts2dErr").textContent="Geçerli bir timestamp girin.";document.getElementById("ts2dResult").style.display="none";return;}
  document.getElementById("ts2dErr").textContent="";
  if(n>9999999999) n=Math.floor(n/1000);
  const d=new Date(n*1000);
  document.getElementById("ts2dLocal").textContent=fmtLocal(d);
  document.getElementById("ts2dUtc").textContent=fmtUtc(d);
  document.getElementById("ts2dIso").textContent=d.toISOString();
  document.getElementById("ts2dRel").textContent=fmtRel(d);
  document.getElementById("ts2dResult").style.display="grid";
}
document.getElementById("ts2dBtn").addEventListener("click",()=>conv_ts2d(document.getElementById("ts2dInput").value));
document.getElementById("ts2dInput").addEventListener("keydown",e=>{if(e.key==="Enter") conv_ts2d(e.target.value);});
document.getElementById("ts2dNowBtn").addEventListener("click",()=>{
  const v=Math.floor(Date.now()/1000);
  document.getElementById("ts2dInput").value=v;
  conv_ts2d(v);
});

/* Tarih → Timestamp */
const now=new Date();
document.getElementById("d2tsInput").value=now.toISOString().slice(0,16);
function conv_d2ts(){
  const val=document.getElementById("d2tsInput").value;
  if(!val){document.getElementById("d2tsErr").textContent="Tarih seçin.";return;}
  document.getElementById("d2tsErr").textContent="";
  const d=new Date(val);
  if(isNaN(d.getTime())){document.getElementById("d2tsErr").textContent="Geçersiz tarih.";return;}
  const sec=Math.floor(d.getTime()/1000);
  document.getElementById("d2tsSec").textContent=sec;
  document.getElementById("d2tsMs").textContent=d.getTime();
  document.getElementById("d2tsIso").textContent=d.toISOString();
  document.getElementById("d2tsResult").style.display="grid";
}
document.getElementById("d2tsBtn").addEventListener("click",conv_d2ts);
conv_d2ts();

/* Kopyala butonları */
document.querySelectorAll("[data-copy]").forEach(btn=>{
  btn.addEventListener("click",async()=>{
    const t=document.getElementById(btn.dataset.copy).textContent;
    await navigator.clipboard.writeText(t);
    const o=btn.textContent;btn.textContent="✓";setTimeout(()=>btn.textContent=o,1500);
  });
});
</script>
</body>
