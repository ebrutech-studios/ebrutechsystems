<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
<span class="eyebrow">Araç</span><h1 style="font-size:2.2rem">🔢 Kelime ve Karakter Sayıcı</h1>
<p class="lead" style="margin:14px 0 26px">Metninizi yazın veya yapıştırın; kelime, karakter, cümle ve okuma süresi bilgileri ile okunabilirlik skoru anında görün.</p>
<textarea id="t" class="ta" placeholder="Metni buraya yazın veya yapıştırın..."></textarea>
<div class="grid g-3" id="stats" style="margin-top:16px;gap:10px"></div>
<div id="readWrap" style="display:none">
<div class="readability-box">
  <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:12px">
    <div>
      <div style="font-size:.78rem;color:var(--txt-faint);margin-bottom:4px">Okunabilirlik Skoru (Flesch-Kincaid)</div>
      <div class="readability-score" id="rScore"></div>
      <div id="rLabel" style="font-size:.88rem;margin-top:4px"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:.78rem;color:var(--txt-faint)">Ortalama</div>
      <div style="font-size:.88rem;color:var(--txt-dim)" id="avgStats"></div>
    </div>
  </div>
  <div class="score-bar"><div class="score-fill" id="rBar"></div></div>
  <div id="rDesc" style="font-size:.82rem;color:var(--txt-faint);margin-top:6px"></div>
</div>
<div style="margin-top:14px">
<div style="font-size:.78rem;color:var(--txt-faint);margin-bottom:8px">Sık Kullanılan Kelimeler</div>
<div id="keywords"></div>
</div>
</div>
</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const t=document.getElementById("t"),statsEl=document.getElementById("stats"),readWrap=document.getElementById("readWrap");
const STOP_WORDS=new Set(["ve","bir","bu","da","de","ile","için","olan","olan","var","ben","sen","o","biz","siz","onlar","ki","mi","mu","mü","gibi","çok","daha","en","ne","ya","ama","fakat","ancak","veya","ya","hem","hem","ya","ile","veya","ile","ya","yani","böyle","şöyle","böylece","ise","eğer","hem","ya","ne","ama","fakat","ancak","lakin","oysa","hâlbuki","her","hiç","hiçbir","bazı","birkaç","birçok","çeşitli","tüm","bütün","hepsi","herkes","herşey","bu","şu","o","bunlar","şunlar","onlar","burası","şurası","orası","artık","zaten","hep","hiç","sık","nadiren","bazen","çoğunlukla","genellikle","daima","asla"]);

function syllables(w){w=w.toLowerCase().replace(/[^aeıioöuü]/g,"");return Math.max(1,w.length);}

function card(v,l){return`<div class="stat-card"><div class="val">${v}</div><div class="lbl">${l}</div></div>`;}

function calc(){
  const s=t.value;
  const kelime=(s.trim().match(/\S+/g)||[]).length;
  const karakter=s.length;
  const bosluksuz=s.replace(/\s/g,"").length;
  const cumle=(s.match(/[.!?]+/g)||[]).length||1;
  const paragraf=(s.split(/\n+/).filter(p=>p.trim()).length)||0;
  const dakika=Math.max(1,Math.ceil(kelime/200));

  statsEl.innerHTML=
    card(kelime.toLocaleString("tr-TR"),"Kelime")+
    card(karakter.toLocaleString("tr-TR"),"Karakter")+
    card(bosluksuz.toLocaleString("tr-TR"),"Boşluksuz")+
    card(cumle.toLocaleString("tr-TR"),"Cümle")+
    card(paragraf.toLocaleString("tr-TR"),"Paragraf")+
    card("~"+dakika+" dk","Okuma Süresi");

  if(kelime<10){readWrap.style.display="none";return;}
  readWrap.style.display="block";

  // readability
  const words_arr=(s.trim().match(/\b\w+\b/g)||[]);
  const totalSyl=words_arr.reduce((a,w)=>a+syllables(w),0);
  const avgWperS=kelime/cumle;
  const avgSylperW=totalSyl/kelime;
  // simplified Flesch Reading Ease (adapted)
  const score=Math.max(0,Math.min(100,206.835-1.015*avgWperS-84.6*avgSylperW));
  let label,color,desc;
  if(score>=90){label="Çok Kolay";color="#3ee8b5";desc="Çocuklar için uygun, 4. sınıf düzeyi.";}
  else if(score>=70){label="Kolay";color="var(--accent)";desc="Ortalama okuyucu kolayca anlayabilir.";}
  else if(score>=50){label="Orta";color="#ffaa33";desc="10-12. sınıf düzeyinde.";}
  else if(score>=30){label="Zor";color="#ff7043";desc="Üniversite düzeyi. Akıcı okuyucular için.";}
  else{label="Çok Zor";color="#ff5555";desc="Akademik / teknik metin.";}

  document.getElementById("rScore").textContent=Math.round(score);
  document.getElementById("rScore").style.color=color;
  document.getElementById("rLabel").innerHTML=`<span style="color:${color};font-weight:700">${label}</span>`;
  document.getElementById("rBar").style.width=score+"%";
  document.getElementById("rBar").style.background=color;
  document.getElementById("rDesc").textContent=desc;
  document.getElementById("avgStats").innerHTML=
    `Cümle başı ${avgWperS.toFixed(1)} kelime<br>Kelime başı ${avgSylperW.toFixed(1)} hece`;

  // top keywords
  const freq={};
  words_arr.forEach(w=>{const lw=w.toLowerCase();if(lw.length>2&&!STOP_WORDS.has(lw))freq[lw]=(freq[lw]||0)+1;});
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById("keywords").innerHTML=top.map(([w,c])=>
    `<span class="keyword-chip">${w} <b style="color:var(--accent)">${c}</b></span>`).join("");
}
t.oninput=calc;calc();
</script></body></html>
