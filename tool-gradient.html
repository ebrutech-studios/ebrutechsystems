<body>
<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">
  <span class="eyebrow">Araç</span>
  <h1 style="font-size:2.2rem">CSS Gradient Üretici</h1>
  <p class="lead" style="margin:14px 0 26px">Linear veya radial degrade oluştur — CSS kodunu kopyala, hemen kullan.</p>

  <div class="grad-preview" id="gradPreview"></div>

  <div class="grad-type-row">
    <button class="grad-type-btn active" data-gt="linear">Linear</button>
    <button class="grad-type-btn" data-gt="radial">Radial</button>
  </div>

  <h3 style="font-size:.8rem;font-weight:700;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Hazır Gradientler</h3>
  <div class="grad-presets" id="gradPresets"></div>

  <div class="grad-controls">
    <div class="grad-ctrl">
      <label>Renk 1</label>
      <div class="grad-color-row">
        <input type="color" class="grad-color-input" id="gc1" value="#c8ff2e">
        <input type="text" class="grad-color-hex" id="gh1" value="#c8ff2e" maxlength="7">
      </div>
      <label>Renk 2</label>
      <div class="grad-color-row">
        <input type="color" class="grad-color-input" id="gc2" value="#29d3ff">
        <input type="text" class="grad-color-hex" id="gh2" value="#29d3ff" maxlength="7">
      </div>
    </div>
    <div class="grad-ctrl" id="angleCtrl">
      <label>Açı</label>
      <div class="grad-angle-wrap">
        <input type="range" id="gradAngle" min="0" max="360" value="135">
        <span class="grad-angle-val" id="gradAngleLbl">135°</span>
      </div>
    </div>
  </div>

  <div class="grad-code" id="gradCode"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-primary" id="gradCopy">CSS Kodunu Kopyala</button>
    <button class="btn btn-ghost" id="gradCopyBg">background Olarak Kopyala</button>
  </div>

</div></div></section>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
const PRESETS=[
  ["#c8ff2e","#29d3ff",135],["#ff6b6b","#ffd93d",135],["#6bcb77","#29d3ff",180],
  ["#a855f7","#ec4899",135],["#f97316","#eab308",90],["#06b6d4","#6366f1",135],
  ["#10b981","#3b82f6",135],["#f43f5e","#8b5cf6",45],["#fbbf24","#ef4444",135],
  ["#000000","#434343",180],["#0f2027","#203a43",135],["#1a1a2e","#c8ff2e",160]
];
let gType="linear";

function hex2rgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
function isValidHex(h){return /^#[0-9a-fA-F]{6}$/.test(h);}

function update(){
  const c1=document.getElementById("gh1").value;
  const c2=document.getElementById("gh2").value;
  if(!isValidHex(c1)||!isValidHex(c2)) return;
  const ang=document.getElementById("gradAngle").value;
  document.getElementById("gradAngleLbl").textContent=ang+"°";
  let css,code;
  if(gType==="linear"){
    css=`linear-gradient(${ang}deg,${c1},${c2})`;
  } else {
    css=`radial-gradient(circle,${c1},${c2})`;
    document.getElementById("angleCtrl").style.opacity=".4";
    document.getElementById("angleCtrl").style.pointerEvents="none";
  }
  document.getElementById("gradPreview").style.background=css;
  code=gType==="linear"?`linear-gradient(${ang}deg, ${c1}, ${c2})`:`radial-gradient(circle, ${c1}, ${c2})`;
  document.getElementById("gradCode").textContent=code;
}

function syncColorPicker(colorId,hexId){
  document.getElementById(colorId).addEventListener("input",function(){
    document.getElementById(hexId).value=this.value;update();
  });
  document.getElementById(hexId).addEventListener("input",function(){
    if(isValidHex(this.value)){document.getElementById(colorId).value=this.value;update();}
  });
}
syncColorPicker("gc1","gh1");
syncColorPicker("gc2","gh2");
document.getElementById("gradAngle").addEventListener("input",update);

document.querySelectorAll(".grad-type-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".grad-type-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");gType=btn.dataset.gt;
    if(gType==="radial"){document.getElementById("angleCtrl").style.opacity=".4";document.getElementById("angleCtrl").style.pointerEvents="none";}
    else{document.getElementById("angleCtrl").style.opacity="1";document.getElementById("angleCtrl").style.pointerEvents="";}
    update();
  });
});

const presetsEl=document.getElementById("gradPresets");
PRESETS.forEach(([c1,c2,ang])=>{
  const d=document.createElement("div");
  d.className="grad-preset";
  d.style.background=`linear-gradient(${ang}deg,${c1},${c2})`;
  d.title=c1+" → "+c2;
  d.addEventListener("click",()=>{
    document.getElementById("gc1").value=c1;document.getElementById("gh1").value=c1;
    document.getElementById("gc2").value=c2;document.getElementById("gh2").value=c2;
    document.getElementById("gradAngle").value=ang;update();
  });
  presetsEl.appendChild(d);
});

async function copyGrad(withBg){
  const code=document.getElementById("gradCode").textContent;
  const txt=withBg?"background: "+code+";":code;
  await navigator.clipboard.writeText(txt);
  const b=document.getElementById(withBg?"gradCopyBg":"gradCopy");
  b.textContent="Kopyalandı";setTimeout(()=>b.textContent=withBg?"background Olarak Kopyala":"CSS Kodunu Kopyala",1800);
}
document.getElementById("gradCopy").addEventListener("click",()=>copyGrad(false));
document.getElementById("gradCopyBg").addEventListener("click",()=>copyGrad(true));

update();
</script>
</body>
