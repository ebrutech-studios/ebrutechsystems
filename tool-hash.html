<section class="hero" style="padding-bottom:30px"><div class="wrap"><div class="tool-shell">

  <h1 style="font-size:2.2rem">Hash Üretici</h1>
  <p class="lead" style="margin:14px 0 16px">Metin veya dosyanın SHA hash değerini hesapla. Tarayıcıda, sunucuya veri gönderilmez.</p>

    <button class="hash-algo-btn" data-algo="SHA-256">SHA-256</button>

  </div>

    📁 Dosya sürükle veya tıkla — dosyanın hash değeri hesaplanır

    <div class="hash-row" id="h-SHA-1">
      <div class="hash-row-label">SHA-1 <button class="hash-copy-btn" data-target="v-SHA-1">Kopyala</button></div>

    </div>
    <div class="hash-row" id="h-SHA-256">
      <div class="hash-row-label">SHA-256 <button class="hash-copy-btn" data-target="v-SHA-256">Kopyala</button></div>

<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/site.js"></script>
<script>
let activeAlgo="all";
const ALGOS=["SHA-1","SHA-256","SHA-384","SHA-512"];

async function hashBuf(buf){
  for(const a of ALGOS){
    if(activeAlgo!=="all"&&a!==activeAlgo){
      document.getElementById("h-"+a).classList.remove("visible");continue;
    }
    try{
      const ab=await crypto.subtle.digest(a,buf);
      const hex=Array.from(new Uint8Array(ab)).map(b=>b.toString(16).padStart(2,"0")).join("");
      document.getElementById("v-"+a).textContent=hex;
      document.getElementById("h-"+a).classList.add("visible");
    }catch(e){
      document.getElementById("h-"+a).classList.remove("visible");
    }
  }
}

async function hashText(){
  const t=document.getElementById("hashInput").value;
  if(!t){ALGOS.forEach(a=>document.getElementById("h-"+a).classList.remove("visible"));return;}
  const buf=new TextEncoder().encode(t);
  await hashBuf(buf);
}

document.getElementById("hashInput").addEventListener("input",hashText);

document.getElementById("algoRow").addEventListener("click",e=>{
  const btn=e.target.closest(".hash-algo-btn");
  if(!btn) return;
  document.querySelectorAll(".hash-algo-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  activeAlgo=btn.dataset.algo;
  hashText();
});

document.querySelectorAll(".hash-copy-btn").forEach(btn=>{
  btn.addEventListener("click",async()=>{
    const t=document.getElementById(btn.dataset.target).textContent;
    if(!t) return;
    await navigator.clipboard.writeText(t);
    const orig=btn.textContent;btn.textContent="Kopyalandı";setTimeout(()=>btn.textContent=orig,1800);
  });
});

const drop=document.getElementById("hashDrop");
const fileIn=document.getElementById("hashFile");
drop.addEventListener("click",()=>fileIn.click());
drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("drag");});
drop.addEventListener("dragleave",()=>drop.classList.remove("drag"));
drop.addEventListener("drop",e=>{
  e.preventDefault();drop.classList.remove("drag");
  const f=e.dataTransfer.files[0];if(f) processFile(f);
});
fileIn.addEventListener("change",()=>{if(fileIn.files[0]) processFile(fileIn.files[0]);});
function processFile(f){
  drop.textContent="📁 "+f.name+" ("+Math.round(f.size/1024)+" KB)";
  const reader=new FileReader();
  reader.onload=async e=>await hashBuf(e.target.result);
  reader.readAsArrayBuffer(f);
  document.getElementById("hashInput").value="";
}
</script>
